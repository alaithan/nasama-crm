                          <td style={{ ...C.td, color: "#6B7280", fontSize: 12, maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.memo || t.description}</td>
                          <td style={{ ...C.td, textAlign: "right", color: "#2563EB", fontWeight: l.debit > 0 ? 600 : 400, whiteSpace: "nowrap" }}>{l.debit > 0 ? fmtAED(l.debit) : "—"}</td>
                          <td style={{ ...C.td, textAlign: "right", color: "#059669", fontWeight: l.credit > 0 ? 600 : 400, whiteSpace: "nowrap" }}>{l.credit > 0 ? fmtAED(l.credit) : "—"}</td>
                        </tr>
                      );
                    });
                  })}
                </tbody>
              </table>
            </div>
          </div>;
        })()}

        {active === "ap" && <APSection accounts={accounts} txns={txns} filtered={filtered} saveTxn={saveTxn} />}
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  VAT PAGE
    // ╚══════════════════════════════════════════╝
    function VATPage({ accounts, txns, invoices, settings }) {
      const [from, setFrom] = useState("2024-01-01"); const [to, setTo] = useState(todayStr());
      const outputVATAcct = accounts.find(a => a.isOutputVAT);
      const inputVATAcct = accounts.find(a => a.isInputVAT);
      const oldVATAcct = accounts.find(a => a.id === "a2100"); // Old single VAT account

      const filtered = txns.filter(t => !t.isVoid && t.date >= from && t.date <= to);
      let outputVAT = 0; let inputVAT = 0; const vatLines = [];

      filtered.forEach(t => t.lines.forEach(l => {
        // New Output VAT account
        if (l.accountId === outputVATAcct?.id) {
          outputVAT += (l.credit || 0);
          vatLines.push({ date: t.date, ref: t.ref, desc: t.description, type: 'Output', amount: l.credit });
        }
        // New Input VAT account
        if (l.accountId === inputVATAcct?.id) {
          inputVAT += (l.debit || 0);
          vatLines.push({ date: t.date, ref: t.ref, desc: t.description, type: 'Input', amount: l.debit });
        }
        // OLD VAT account (backwards compatibility)
        if (l.accountId === oldVATAcct?.id) {
          if (l.credit > 0) {
            outputVAT += l.credit;
            vatLines.push({ date: t.date, ref: t.ref, desc: t.description, type: 'Output', amount: l.credit });
          }
          if (l.debit > 0) {
            inputVAT += l.debit;
            vatLines.push({ date: t.date, ref: t.ref, desc: t.description, type: 'Input', amount: l.debit });
          }
        }
      }));

      return <div>
        <PageHeader title="VAT Summary" sub={`TRN: ${settings.trn} · UAE VAT 5%`} />
        {oldVATAcct && <div style={{ background: '#F0F9FF', padding: 16, borderRadius: 8, marginBottom: 16, border: '1px solid #BFDBFE' }}>
          ℹ️ <strong>Note:</strong> Your system uses the legacy VAT account structure. The system is backwards compatible and displays your VAT data correctly.
        </div>}
        <div style={{ display: "flex", gap: 10, marginBottom: 20, alignItems: "center", background: "#fff", border: "1px solid #E5E7EB", borderRadius: 9, padding: "10px 16px", flexWrap: "wrap" }}>
          <label style={{ fontSize: 12, color: "#6B7280" }}>From</label><input style={{ ...C.input, width: 150 }} type="date" value={from} onChange={e => setFrom(e.target.value)} />
          <label style={{ fontSize: 12, color: "#6B7280" }}>To</label><input style={{ ...C.input, width: 150 }} type="date" value={to} onChange={e => setTo(e.target.value)} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 20 }}>
          {[{ l: "Output VAT Collected", v: outputVAT, c: "#DC2626" }, { l: "Input VAT Recoverable", v: inputVAT, c: "#059669" }, { l: "Net VAT Payable", v: outputVAT - inputVAT, c: "#7C3AED" }].map((k, i) => <div key={i} style={{ ...C.card, padding: 20, textAlign: "center", borderTop: `3px solid ${k.c}` }}><div style={{ fontSize: 11, color: "#6B7280", fontWeight: 600, textTransform: "uppercase", marginBottom: 8 }}>{k.l}</div><div style={{ fontSize: 22, fontWeight: 800, color: k.c }}>{fmtAED(k.v)}</div></div>)}
        </div>
        <div style={C.card}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid #E5E7EB", fontWeight: 600, fontSize: 15 }}>VAT Transactions Detail</div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr><th style={C.th}>Date</th><th style={C.th}>Ref</th><th style={C.th}>Description</th><th style={C.th}>Type</th><th style={{ ...C.th, textAlign: "right" }}>Amount</th></tr></thead>
              <tbody>{vatLines.length === 0 && <tr><td colSpan={5} style={{ ...C.td, textAlign: "center", color: "#6B7280", padding: 24 }}>No VAT transactions in period</td></tr>}{vatLines.map((r, i) => <tr key={i}><td style={{ ...C.td, whiteSpace: "nowrap" }}>{fmtDate(r.date)}</td><td style={{ ...C.td, fontFamily: "monospace", fontSize: 12, color: GOLD_D }}>{r.ref || "—"}</td><td style={C.td}>{r.desc}</td><td style={C.td}><span style={C.badge(r.type === 'Output' ? 'danger' : 'success')}>{r.type}</span></td><td style={{ ...C.td, textAlign: "right", color: r.type === 'Output' ? "#DC2626" : "#059669", fontWeight: 600, whiteSpace: "nowrap" }}>{fmtAED(r.amount)}</td></tr>)}
              </tbody>
            </table>
          </div>
        </div>
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  SELF-CHECK TESTS
    // ╚══════════════════════════════════════════╝
    function SelfCheckPage({ accounts, txns, invoices, ledger, deals, saveTxn, setInvoices }) {
      const [results, setResults] = useState([]); const [running, setRunning] = useState(false);
      const run = () => {
        setRunning(true); const r = [];
        const P = (l, d = "") => r.push({ ok: true, l, d }); const F = (l, d = "") => r.push({ ok: false, l, d });
        // 1. All transactions balanced
        const unbal = txns.filter(t => { const dr = t.lines.reduce((s, l) => s + (l.debit || 0), 0); const cr = t.lines.reduce((s, l) => s + (l.credit || 0), 0); return !t.isVoid && dr !== cr; });
        unbal.length ? F("All transactions balanced (Dr=Cr)", `${unbal.length} unbalanced: ${unbal.map(t => t.ref || t.id).join(", ")}`) : P("All transactions balanced ✅", `${txns.filter(t => !t.isVoid).length} transactions verified`);
        const extAccounts = Array.from(new Set([...accounts.map(a => a.id), ...Object.keys(ledger)])).map(id => accounts.find(a => a.id === id) || { id, type: "Asset", name: "Deleted", isUnknown: true });
        // 2. Trial balance
        const tDr = extAccounts.reduce((s, a) => s + (ledger[a.id]?.debit || 0), 0); const tCr = extAccounts.reduce((s, a) => s + (ledger[a.id]?.credit || 0), 0);
        tDr === tCr ? P("Trial Balance: Dr=Cr ✅", `Both sides = ${fmtAED(tDr)}`) : F("Trial Balance imbalance", `Dr ${fmtAED(tDr)} ≠ Cr ${fmtAED(tCr)}`);
        // 3. Invoice VAT successfully posted to Journal
        const { outputVAT } = getVATAccounts(accounts);  // Use backwards-compatible helper
        const activeInvs = invoices.filter(i => i.status === "Posted");  // Only count Posted invoices, not Drafts
        const invVAT = activeInvs.reduce((s, i) => s + toCents(i.totals?.vat || 0), 0);
        let postedVAT = 0;
        activeInvs.forEach(inv => {
          const t = txns.find(x => x.id === inv.txn_id);
          if (t && outputVAT) {
            // Check for Output VAT credits in the transaction
            postedVAT += t.lines.filter(l => l.accountId === outputVAT.id && l.credit > 0).reduce((s, l) => s + l.credit, 0);
          }
        });
        Math.abs(postedVAT - invVAT) < 100 ? P("Invoice Output VAT matches Journal postings ✅", `Matched perfectly: ${fmtAED(invVAT)}`) : F("VAT Data Sync Mismatch", `Invoices sum to ${fmtAED(invVAT)}, but journal posted ${fmtAED(postedVAT)}`);
        // 4. Revenue at net only
        const revAccts = accounts.filter(a => a.type === "Revenue"); let revOk = true;
        invoices.filter(i => i.status === "Posted").forEach(inv => { const t = txns.find(x => x.id === inv.txn_id); if (!t) return; const revLines = t.lines.filter(l => revAccts.some(a => a.id === l.accountId)); const revTotal = revLines.reduce((s, l) => s + (l.credit - l.debit), 0); const netC = toCents(inv.totals?.net || 0); if (Math.abs(revTotal - netC) > 50) { revOk = false; F(`Invoice ${inv.ref}: Revenue posted ≠ Net`, `Rev: ${fmtAED(revTotal)}, Net: ${fmtAED(netC)}`); } });
        if (revOk) P("Revenue recognised at NET amount only (not gross) ✅");
        // 5. No revenue on ineligible deals
        const badRev = txns.filter(t => !t.isVoid).flatMap(t => t.lines.filter(l => { const a = accounts.find(x => x.id === l.accountId); return a?.type === "Revenue" && l.credit > 0 && l.deal_id; })).filter(l => { const d = deals.find(x => x.id === l.deal_id); return d && !REV_STAGES.includes(d.stage); });
        if (badRev.length === 0) {
          P("No revenue on ineligible deal stages ✅", "All revenue properly linked to eligible deals");
        } else {
          F("Revenue recorded on ineligible deal stages ❌", `${badRev.length} violation(s) found - revenue should only be recognized at: ${REV_STAGES.join(', ')}`);
          badRev.forEach(l => {
            const d = deals.find(x => x.id === l.deal_id);
            const t = txns.find(x => x.lines.includes(l));
            F(`  → Deal: ${d?.property_name || l.deal_id}`, `Stage: "${d?.stage}" (not eligible) - Amount: ${fmtAED(l.credit)} - Txn: ${t?.ref || t?.id}`);
          });
        }
        // 6. Double-entry minimum 2 lines
        const single = txns.filter(t => !t.isVoid && t.lines.length < 2);
        single.length ? F("Single-line transactions found", `${single.length} transaction(s) with <2 lines`) : P("All transactions have ≥ 2 lines (double-entry enforced) ✅");
        // 7. Synthetic AED 10,000 + 5% VAT test
        const arA = accounts.find(a => a.isReceivable); const revA = accounts.find(a => a.type === "Revenue"); const outVAT = accounts.find(a => a.isOutputVAT);
        if (arA && revA && outVAT) { const net = 1000000, vat = 50000, gross = 1050000; const testDr = gross, testCr = net + vat; testDr === testCr ? P("Sample invoice: AED 10,000 net + 5% VAT — Dr=Cr ✅", `Dr = Cr = ${fmtAED(testDr)}`) : F("Sample invoice test failed"); net === 1000000 ? P("Sample: Revenue = AED 10,000 net, NOT AED 10,500 gross ✅") : F("Revenue amount mismatch"); }
        // 8. Balance Sheet equation
        const tA = extAccounts.filter(a => a.type === "Asset").reduce((s, a) => s + accountBalance(a, ledger), 0);
        const tL = extAccounts.filter(a => a.type === "Liability").reduce((s, a) => s + accountBalance(a, ledger), 0);
        const tE = extAccounts.filter(a => a.type === "Equity").reduce((s, a) => s + accountBalance(a, ledger), 0);
        const tR = extAccounts.filter(a => a.type === "Revenue").reduce((s, a) => s + accountBalance(a, ledger), 0);
        const tEx = extAccounts.filter(a => a.type === "Expense").reduce((s, a) => s + accountBalance(a, ledger), 0);
        const netIncome = tR - tEx; // FIXED: Removed Math.abs() - tEx is already correctly signed (debit-credit)
        Math.abs(tA - (tL + tE + netIncome)) < 100 ? P("Balance Sheet: Assets = Liabilities + Equity ✅", `A=${fmtAED(tA)} | L+E=${fmtAED(tL + tE + netIncome)}`) : F("Balance Sheet equation broken", `Assets=${fmtAED(tA)}, L+E+NI=${fmtAED(tL + tE + netIncome)}`);
        // 9. Orphaned Transactions
        const orphanedTxns = txns.filter(t => !t.isVoid && t.lines.some(l => !accounts.find(a => a.id === l.accountId)));
        if (orphanedTxns.length === 0) {
          P("No active transactions with orphaned accounts ✅", "All journal entries link to valid accounts");
        } else {
          F("Transactions linked to deleted accounts found ❌", `${orphanedTxns.length} active transaction(s) reference accounts that no longer exist in the Chart of Accounts.`);
          orphanedTxns.forEach(t => {
            const badAccounts = [...new Set(t.lines.filter(l => !accounts.find(a => a.id === l.accountId)).map(l => l.accountId))].join(', ');
            F(`  → Txn: ${t.ref || t.id}`, `Date: ${t.date} | Missing Account IDs: ${badAccounts} | Description: ${t.description.substring(0, 30)}`);
          });
        }
        setTimeout(() => { setResults(r); setRunning(false); }, 400);
      };
      const passed = results.filter(r => r.ok).length; const failed = results.filter(r => !r.ok).length;
      return <div>
        <PageHeader title="Self-Check Tests" sub="Automated accounting integrity validation">
          <button style={C.btn()} onClick={run} disabled={running}>{running ? "⏳ Running…" : "▶ Run All Self-Checks"}</button>
        </PageHeader>
        {running && <div style={{ textAlign: "center", padding: 40, color: "#6B7280" }}>⏳ Running validation suite…</div>}
        {results.length > 0 && !running && <div style={{ ...C.card, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", background: failed === 0 ? "#ECFDF5" : "#FEF2F2", display: "flex", gap: 12, alignItems: "center" }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: failed === 0 ? "#059669" : "#DC2626" }}>{failed === 0 ? "✅ ALL TESTS PASSED" : "⚠️ SOME TESTS FAILED"}</span>
            <span style={C.badge("success")}>{passed} PASS</span>
            {failed > 0 && <span style={C.badge("danger")}>{failed} FAIL</span>}
            <span style={{ fontSize: 12, color: "#6B7280" }}>{results.length} checks</span>
          </div>
          <div style={{ padding: "0 20px 8px" }}>
            {results.map((r, i) => <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 0", borderBottom: "1px solid #F3F4F6" }}>
              <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>{r.ok ? "✅" : "❌"}</span>
              <div><div style={{ fontWeight: 600, fontSize: 13 }}>{r.l}</div>{r.d && <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2 }}>{r.d}</div>}</div>
            </div>)}
          </div>
        </div>}
        {!results.length && !running && <div style={{ ...C.card, textAlign: "center", padding: "56px 24px", color: "#6B7280" }}>
          <div style={{ fontSize: 52, marginBottom: 14 }}>🧪</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8, color: NAVY }}>Accounting Integrity Suite</div>
          <div style={{ fontSize: 13, maxWidth: 480, margin: "0 auto", lineHeight: 1.7 }}>Runs 9 automated checks covering double-entry balance, trial balance reconciliation, VAT Control matching, revenue recognition rules, deal stage validation, Balance Sheet equation (Assets = L + E), and orphaned account identification.</div>
          <button style={{ ...C.btn(), marginTop: 20 }} onClick={run}>▶ Run Self-Checks</button>
        </div>}
      </div>;
    }

        const unsubscribe = db.collection('users').onSnapshot(snap => {
          const usersData = snap.docs.map(d => d.data());

          setLoading(false);
        }, err => {
          console.error('Error loading users:', err);
          toast('Failed to load users: ' + err.message, 'error');
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      // No add user function needed

      const handleToggleActive = async (user) => {
        try {
          await db.collection('users').doc(user.uid).update({ isActive: !user.isActive });
          await logAudit('user_status_changed', { targetUser: user.email, newStatus: !user.isActive ? 'active' : 'inactive' }, userRole, userEmail);
          toast(`User ${!user.isActive ? 'activated' : 'deactivated'}`, 'success');
        } catch (err) {
          toast('Failed to update user: ' + err.message, 'error');
        }
      };

      const handleChangeRole = async (user, newRole) => {
        try {
          await db.collection('users').doc(user.uid).update({ role: newRole });
          await logAudit('user_role_changed', { targetUser: user.email, oldRole: user.role, newRole: newRole }, userRole, userEmail);
          toast('Role updated successfully', 'success');
        } catch (err) {
          toast('Failed to update role: ' + err.message, 'error');
        }
      };

      const handleSendPasswordReset = async (user) => {
        if (!window.confirm(`Send password reset email to ${user.email}?`)) {
          return;
        }

        try {
          await auth.sendPasswordResetEmail(user.email);
          await logAudit('password_reset_sent', { targetUser: user.email }, userRole, userEmail).catch(e => console.warn('Audit log failed:', e));
          toast(`✅ Password reset email sent to ${user.email}`, 'success');
        } catch (err) {
          console.error('Error sending password reset:', err);
          toast('Failed to send password reset email: ' + err.message, 'error');
        }

        return <div style={{ textAlign: 'center', padding: 60, color: '#6B7280' }}>Loading users...</div>;

            <thead>
              <tr>
                <th style={C.th}>User</th>
                <th style={C.th}>Email</th>
                <th style={C.th}>Role</th>
                <th style={C.th}>Status</th>
                <th style={C.th}>Last Login</th>
                <th style={{ ...C.th, textAlign: 'right' }}>Actions</th>
              </tr>
            </thead>

              {users.map(user => (
                <tr key={user.uid}>
                  <td style={C.td}>

                    {user.uid === auth.currentUser.uid && <span style={{ fontSize: 11, color: GOLD }}>👑 You</span>}
                  </td>
                  <td style={C.td}>{user.email}</td>
                  <td style={C.td}>
                    {user.uid === auth.currentUser.uid ? (
                      <span style={{ ...C.badge(user.role === USER_ROLES.ADMIN ? 'warning' : user.role === USER_ROLES.SECRETARY ? 'neutral' : 'info'), fontSize: 11 }}>
                        {user.role === USER_ROLES.ADMIN ? '👑 Admin' : user.role === USER_ROLES.SECRETARY ? '📝 Secretary' : '📊 Accountant'}
                      </span>
                    ) : (
                      <select style={{ ...C.select, width: 'auto', padding: '4px 8px', fontSize: 12 }} value={user.role} onChange={(e) => handleChangeRole(user, e.target.value)}>
                        <option value={USER_ROLES.ADMIN}>👑 Admin</option>
                        <option value={USER_ROLES.ACCOUNTANT}>📊 Accountant</option>
                        <option value={USER_ROLES.SECRETARY}>📝 Secretary</option>
                      </select>
                    )}
                  </td>
                  <td style={C.td}>
                    <span style={C.badge(user.isActive ? 'success' : 'neutral')}>
                      {user.isActive ? '✅ Active' : '⛔ Inactive'}
                    </span>
                  </td>
                  <td style={{ ...C.td, color: '#6B7280', fontSize: 12 }}>
                    {user.lastLogin ? new Date(user.lastLogin).toLocaleString() : 'Never'}
                  </td>
                  <td style={{ ...C.td, textAlign: 'right' }}>
                    <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                      {user.uid !== auth.currentUser.uid && (

    function SettingsPage({ settings, setSettings, accounts, setAccounts, txns, saveTxn, setTxns, deals, setDeals, invoices, setInvoices, cheques, setCheques, customers, setCustomers, vendors, setVendors, brokers, setBrokers, developers, setDevelopers, onClearDemoData, userRole, userEmail }) {
      const parseBal = (v) => parseFloat(String(v || 0).replace(/,/g, '')) || 0;
      const [f, setF] = useState({ ...settings, openBank: settings.openBank || 0, openAR: settings.openAR || 0, openAP: settings.openAP || 0, openEquity: settings.openEquity || 0, openRetained: settings.openRetained || 0 });
      const openDiff = parseBal(f.openBank) + parseBal(f.openAR) - parseBal(f.openAP) - parseBal(f.openEquity) - parseBal(f.openRetained);
      const [backingUp, setBackingUp] = useState(false);
      const [restoring, setRestoring] = useState(false);
      const fileInputRef = useRef(null);

      // Password change state
      const [showPasswordChange, setShowPasswordChange] = useState(false);
      const [currentPassword, setCurrentPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [changingPassword, setChangingPassword] = useState(false);

      // Password change handler
      const handleChangePassword = async () => {
        // Validation
        if (!currentPassword || !newPassword || !confirmPassword) {
          toast('Please fill in all fields', 'error');
          return;
        }

        if (newPassword !== confirmPassword) {
          toast('New passwords do not match', 'error');
          return;
        }

        if (newPassword.length < 6) {
          toast('Password must be at least 6 characters', 'error');
          return;
        }

        setChangingPassword(true);

        try {
          const user = auth.currentUser;

          // Re-authenticate user with current password
          const credential = firebase.auth.EmailAuthProvider.credential(
            user.email,
            currentPassword
          );

          await user.reauthenticateWithCredential(credential);
          console.log('✅ Re-authentication successful');

          // Update password
          await user.updatePassword(newPassword);
          console.log('✅ Password updated successfully');

          toast('✅ Password changed successfully!', 'success');

          // Reset form
          setCurrentPassword('');
          setNewPassword('');
          setConfirmPassword('');
          setShowPasswordChange(false);

        } catch (err) {
          console.error('❌ Error changing password:', err);

          if (err.code === 'auth/wrong-password') {
            toast('Current password is incorrect', 'error');
          } else if (err.code === 'auth/weak-password') {
            toast('Password is too weak', 'error');
          } else {
            toast('Failed to change password: ' + err.message, 'error');
          }
        } finally {
          setChangingPassword(false);
        }
      };

      const backupFirebase = async () => {
        setBackingUp(true);
        toast("Fetching live data from Firebase...", "info");
        try {
          const collections = ['accounts', 'transactions', 'deals', 'invoices', 'cheques', 'customers', 'vendors', 'brokers', 'developers'];
          const dbData = { settings, exportedAt: new Date().toISOString(), source: "Firebase Cloud Firestore" };
          for (const coll of collections) {
            const snap = await db.collection(coll).get();
            dbData[coll] = snap.docs.map(doc => doc.data());
          }
          const b = new Blob([JSON.stringify(dbData, null, 2)], { type: "application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(b);
          a.download = `nasama-firebase-backup-${new Date().toISOString().split('T')[0]}.json`;
          a.click();
          toast("Firebase Backup exported successfully ✅", "success");
        } catch (e) {
          console.error(e);
          toast("Error pulling backup from Firebase", "error");
        }
        setBackingUp(false);
      };

      const handleRestore = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!window.confirm(`⚠️ RESTORE DATABASE Warning ⚠️\n\nThis will OVERWRITE your current Firebase Database with the data from "${file.name}".\n\nThis cannot be undone. Are you totally sure?`)) {
          e.target.value = "";
          return;
        }

        setRestoring(true);
        toast("Reading backup file...", "info");
        try {
          const text = await file.text();
          const dbData = JSON.parse(text);
          if (!dbData.source || dbData.source !== "Firebase Cloud Firestore") {
            toast("Invalid backup file. Must be a direct Firebase Backup JSON.", "error");
            setRestoring(false);
            e.target.value = "";
            return;
          }

          toast("Restoring data to Firebase...", "info");
          const collections = ['accounts', 'transactions', 'deals', 'invoices', 'cheques', 'customers', 'vendors', 'brokers', 'developers'];

          for (const coll of collections) {
            if (dbData[coll] && Array.isArray(dbData[coll])) {
              // Batch write replacement to collection
              const querySnap = await db.collection(coll).get();
              // We'll write docs directly. Note: Production restores usually need batch logic due to 500 doc limit.
              // Assuming small dataset for now, we process sequentially for safety.
              for (const doc of dbData[coll]) {
                await db.collection(coll).doc(doc.id).set(doc);
              }
            }
          }
          if (dbData.settings) {
            await db.collection('metadata').doc('settings').set(dbData.settings);
          }
          toast("Database restored successfully! Please refresh the page.", "success");
          setTimeout(() => window.location.reload(), 2000); // Reload to pull fresh restored data

        } catch (err) {
          console.error(err);
          toast("Error restoring database. Check console.", "error");
        }
        setRestoring(false);
        e.target.value = "";
      };

      return <div>
        <PageHeader title="Settings" />

        {/* Security Section - Password Change */}
        <div style={{ ...C.card, marginBottom: 16 }}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid #E5E7EB", fontWeight: 600, fontSize: 15 }}>
            🔐 Security
          </div>
          <div style={{ padding: 20 }}>
            {!showPasswordChange ? (
              <div>
                <p style={{ marginBottom: 12, color: '#6B7280', fontSize: 13 }}>
                  Logged in as: <strong>{userEmail}</strong>
                </p>
                <button
                  style={C.btn('primary')}
                  onClick={() => setShowPasswordChange(true)}
                >
                  🔑 Change My Password
                </button>
              </div>
            ) : (
              <div>
                <div style={{ ...C.warn, marginBottom: 16 }}>
                  ⚠️ <strong>Security Notice:</strong> You'll need to log in again with your new password after changing it.
                </div>

                <FG>
                  <FItem label="Current Password" req full>
                    <Inp
                      type="password"
                      value={currentPassword}
                      onChange={(e) => setCurrentPassword(e.target.value)}
                      placeholder="Enter current password"
                    />
                  </FItem>

                  <FItem label="New Password" req full>
                    <Inp
                      type="password"
                      value={newPassword}
                      onChange={(e) => setNewPassword(e.target.value)}
                      placeholder="At least 6 characters"
                    />
                  </FItem>

                  <FItem label="Confirm New Password" req full>
                    <Inp
                      type="password"
                      value={confirmPassword}
                      onChange={(e) => setConfirmPassword(e.target.value)}
                      placeholder="Re-type new password"
                    />
                  </FItem>
                </FG>

                <div style={{ display: 'flex', gap: 12, marginTop: 16 }}>
                  <button
                    style={C.btn('primary')}
                    onClick={handleChangePassword}
                    disabled={changingPassword}
                  >
                    {changingPassword ? '⏳ Changing...' : '✅ Change Password'}
                  </button>

                  <button
                    style={C.btn('secondary')}
                    onClick={() => {
                      setShowPasswordChange(false);
                      setCurrentPassword('');
                      setNewPassword('');
                      setConfirmPassword('');
                    }}
                    disabled={changingPassword}
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>

        <div style={{ ...C.card, marginBottom: 16 }}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid #E5E7EB", fontWeight: 600, fontSize: 15 }}>Company Settings</div>
          <div style={{ padding: 20 }}>
            <FG>
              <FItem label="Company Name"><Inp value={f.company} onChange={e => setF(p => ({ ...p, company: e.target.value }))} /></FItem>
              <FItem label="TRN (Tax Registration No.)"><Inp value={f.trn} onChange={e => setF(p => ({ ...p, trn: e.target.value }))} /></FItem>
              <FItem label="Currency"><Inp value={f.currency} onChange={e => setF(p => ({ ...p, currency: e.target.value }))} /></FItem>
              <FItem label="Default VAT Rate %"><Inp type="number" value={f.vatRate} onChange={e => setF(p => ({ ...p, vatRate: parseFloat(e.target.value) || 5 }))} /></FItem>
            </FG>
          </div>
        </div>
        <div style={{ ...C.card, marginBottom: 16 }}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid #E5E7EB", fontWeight: 600, fontSize: 15, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>Starting Balances</span>
            <span style={C.badge(Math.abs(openDiff) < 0.01 ? "success" : "danger")}>Diff: {fmtAED(toCents(openDiff))} {Math.abs(openDiff) < 0.01 ? "✅ Balanced!" : "❌ Must be 0"}</span>
          </div>
          <div style={{ padding: 20 }}>
            <div style={{ ...C.warn, marginBottom: 16 }}>⚠️ Note: These are double-entry. Total Assets (Bank + AR) MUST equal Total Liabilities & Equity (AP + Owner's Equity + Retained Earnings), or it will not save.</div>
            <FG>
              <FItem label="Bank Balance (AED) [Asset Dr]"><Inp type="text" value={f.openBank} onChange={e => setF(p => ({ ...p, openBank: e.target.value }))} /></FItem>
              <FItem label="Accounts Receivable (AED) [Asset Dr]"><Inp type="text" value={f.openAR} onChange={e => setF(p => ({ ...p, openAR: e.target.value }))} /></FItem>
              <FItem label="Accounts Payable (AED) [Liab Cr]"><Inp type="text" value={f.openAP} onChange={e => setF(p => ({ ...p, openAP: e.target.value }))} /></FItem>
              <FItem label="Owner's Equity (AED) [Equity Cr]"><Inp type="text" value={f.openEquity} onChange={e => setF(p => ({ ...p, openEquity: e.target.value }))} /></FItem>
              <FItem label="Retained Earnings (AED) [Equity Cr]"><Inp type="text" value={f.openRetained} onChange={e => setF(p => ({ ...p, openRetained: e.target.value }))} /></FItem>
            </FG>
          </div>
        </div>
        <div style={C.card}>
          <div style={{ padding: "13px 18px", borderBottom: "1px solid #E5E7EB", fontWeight: 600, fontSize: 15 }}>Data Management</div>
          <div style={{ padding: 20 }}>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
              <button style={{ ...C.btn("primary"), background: "#059669", borderColor: "#059669" }} onClick={backupFirebase} disabled={backingUp || restoring}>
                {backingUp ? "⏳ Backing up..." : "☁️ Backup Live Database"}
              </button>
              <input type="file" ref={fileInputRef} onChange={handleRestore} accept=".json" style={{ display: "none" }} />
              <button style={{ ...C.btn("danger") }} onClick={() => fileInputRef.current.click()} disabled={backingUp || restoring}>
                {restoring ? "⏳ Restoring..." : "📥 Restore Backup"}
              </button>
              <button
                style={{ ...C.btn("primary"), background: "#7C3AED", borderColor: "#7C3AED" }}
                onClick={async () => {
                  if (!confirm('Update account classification:\n• Remove: 9990 - Bank Internal Adjustment (Equity)\n• Add: 1190 - Bank Reconciliation Adjustments (Asset)\n\nContinue?')) return;

                  try {
                    toast('🔄 Updating accounts...', 'info');

                    const accountsSnap = await db.collection('accounts').doc('all').get();
                    if (!accountsSnap.exists) {
                      toast('❌ No accounts found in database', 'error');
                      return;
                    }

                    let accts = accountsSnap.data().accounts || [];

                    // Remove old account
                    const oldAccount = accts.find(a => a.id === 'a9990' || a.code === '9990');
                    if (oldAccount) {
                      accts = accts.filter(a => a.id !== 'a9990' && a.code !== '9990');
                      console.log('✓ Removed old account:', oldAccount.name);
                    } else {
                      console.log('ℹ Old account (9990) not found - might already be migrated');
                    }

                    // Add new account if not exists
                    const newAccountExists = accts.find(a => a.id === 'a1190' || a.code === '1190');
                    if (!newAccountExists) {
                      accts.push({
                        id: 'a1190',
                        code: '1190',
                        name: 'Bank Reconciliation Adjustments',
                        type: 'Asset',
                        isBank: false,
                        isReceivable: false,
                        isPayable: false,
                        isVATControl: false,
                        isOutputVAT: false,
                        isInputVAT: false
                      });
                      console.log('✓ Added new account: Bank Reconciliation Adjustments');
                    } else {
                      console.log('ℹ New account (1190) already exists');
                    }

                    // Save to Firestore
                    await db.collection('accounts').doc('all').set({ accounts: accts });
                    setAccounts(accts);

                    toast('✅ Accounts updated successfully!', 'success');
                    console.log('✅ Migration complete');

                    setTimeout(() => {
                      toast('🔄 Refreshing page...', 'info');
                      location.reload();
                    }, 1500);

                  } catch (error) {
                    console.error('❌ Migration error:', error);
                    toast(`❌ Migration failed: ${error.message}`, 'error');
                  }
                }}

                🔧 Fix Account Classification
              </button>

              <button
                style={{ ...C.btn("warning"), background: "#DC2626", borderColor: "#DC2626", color: "#fff" }}
                onClick={async () => {
                  // Find all voided invoices with active transactions
                  const voidedInvoices = invoices.filter(inv => inv.status === "Void");

                  if (voidedInvoices.length === 0) {
                    toast('✅ No voided invoices found!', 'success');
                    return;
                  }

                  // Check which ones have active transactions
                  const orphanedInvoices = voidedInvoices.filter(inv => {
                    if (!inv.txn_id) return false;
                    const txn = txns.find(t => t.id === inv.txn_id);
                    return txn && !txn.isVoid; // Has transaction that is NOT voided
                  });

                  if (orphanedInvoices.length === 0) {
                    toast(`✅ All ${voidedInvoices.length} voided invoices are clean! No active transactions found.`, 'success');
                    return;
                  }

                  const totalAmount = orphanedInvoices.reduce((sum, inv) => sum + (inv.totals?.gross || 0), 0);

                  if (!confirm(`⚠️ CLEANUP TOOL\n\nFound ${orphanedInvoices.length} voided invoices with active transactions.\nTotal AR impact: AED ${(totalAmount / 100).toFixed(2)}\n\nThis will void all ${orphanedInvoices.length} transactions IN FIRESTORE.\n\nContinue?`)) {
                    return;
                  }

                  try {
                    toast('🔄 Voiding transactions in Firestore...', 'info');
                    console.log('🔄 Starting cleanup...');

                    // Get current transactions from Firestore
                    const txnsRef = db.collection('transactions').doc('np_transactions');
                    const txnsSnap = await txnsRef.get();

                    if (!txnsSnap.exists) {
                      toast('❌ Transactions document not found in Firestore!', 'error');
                      return;
                    }

                    let allTxns = txnsSnap.data().transactions || [];
                    console.log(`📊 Total transactions in Firestore: ${allTxns.length}`);

                    // Void all the transactions
                    const txnIds = orphanedInvoices.map(inv => inv.txn_id).filter(Boolean);
                    console.log(`🎯 Transaction IDs to void:`, txnIds);

                    let voidedCount = 0;
                    allTxns = allTxns.map(t => {
                      if (txnIds.includes(t.id)) {
                        voidedCount++;
                        console.log(`  ✓ Voiding transaction: ${t.id} (${t.ref})`);
                        return { ...t, isVoid: true };
                      }
                      return t;
                    });

                    console.log(`📝 Voided ${voidedCount} transactions`);

                    // Save back to Firestore
                    await txnsRef.set({ transactions: allTxns });
                    console.log('✅ Saved to Firestore');

                    // Update local state
                    setTxns(allTxns);
                    console.log('✅ Updated local state');

                    // Build report
                    const report = orphanedInvoices.map(inv =>
                      `• ${inv.ref}: AED ${((inv.totals?.gross || 0) / 100).toFixed(2)}`
                    ).join('\n');

                    toast(`✅ Cleanup Complete!\n\nVoided ${voidedCount} transactions in Firestore:\n${report.substring(0, 150)}${report.length > 150 ? '...' : ''}`, 'success');

                    console.log('✅ CLEANUP REPORT:');
                    console.log(`Total voided invoices: ${voidedInvoices.length}`);
                    console.log(`Fixed orphaned invoices: ${orphanedInvoices.length}`);
                    console.log(`Total AR reduction: AED ${(totalAmount / 100).toFixed(2)}`);
                    console.log('Details:', orphanedInvoices.map(inv => ({
                      invoice: inv.ref,
                      amount: (inv.totals?.gross || 0) / 100,
                      txn_id: inv.txn_id
                    })));

                    setTimeout(() => {
                      toast('🔄 Refreshing page to show updated data...', 'info');
                      setTimeout(() => location.reload(), 1000);
                    }, 2000);

                  } catch (error) {
                    console.error('❌ Cleanup error:', error);
                    toast(`❌ Cleanup failed: ${error.message}`, 'error');
                  }
                }}
              >
                🧹 Fix Voided Invoices (Cleanup Tool)
              </button>

              <div>☁️ <strong>Storage:</strong> Firebase Firestore (cloud real-time database) + localStorage cache</div>
              <div>⚖️ <strong>Double-entry:</strong> Every transaction blocked unless Σ Debits = Σ Credits (integer cents arithmetic)</div>
              <div>🧾 <strong>UAE VAT:</strong> 5% default · Separate Input VAT (1201) & Output VAT (2101) accounts · Net revenue only, never gross</div>
              <div>🏗️ <strong>Revenue recognition:</strong> Blocked until deal stage ≥ "Commission Earned"</div>
              <div>📋 <strong>Posting Preview:</strong> Every journal shows Dr/Cr preview before confirming</div>
              <div>⚠️ <strong>Unusual postings:</strong> Flagged with ⚠ badge (e.g., crediting an Expense account)</div>
              <div>🔄 <strong>Void only:</strong> Transactions cannot be deleted — void creates an audit trail</div>
              <div>🇦🇪 <strong>Currency:</strong> AED only · Amounts stored as integer cents to eliminate floating-point errors</div>
            </div>

            setSettings(f);
            // Handle opening balances
            // Handle opening balances
            const existingOpenT = txns.find(t => t.ref === "OPENING-BAL");

            const lines = [];
            if (parseBal(f.openBank)) lines.push({ id: uid(), accountId: "a1002", debit: toCents(parseBal(f.openBank)), credit: 0, memo: "Opening Balance" });
            if (parseBal(f.openAR)) lines.push({ id: uid(), accountId: "a1003", debit: toCents(parseBal(f.openAR)), credit: 0, memo: "Opening Balance" });
            if (parseBal(f.openAP)) lines.push({ id: uid(), accountId: "a2001", debit: 0, credit: toCents(parseBal(f.openAP)), memo: "Opening Balance" });
            if (parseBal(f.openEquity)) lines.push({ id: uid(), accountId: "a3001", debit: 0, credit: toCents(parseBal(f.openEquity)), memo: "Opening Balance" });
            if (parseBal(f.openRetained)) lines.push({ id: uid(), accountId: "a3002", debit: 0, credit: toCents(parseBal(f.openRetained)), memo: "Opening Balance" });

            if (lines.length > 0) {
              const tDr = lines.reduce((s, l) => s + l.debit, 0); const tCr = lines.reduce((s, l) => s + l.credit, 0);
              if (tDr !== tCr) {
                toast(`Opening balances must balance! Diff: ${fromCents(Math.abs(tDr - tCr))}`, "error");
                return;
              }
              const newTxn = {
                id: existingOpenT ? existingOpenT.id : "txn-open-" + uid(),
                date: existingOpenT ? existingOpenT.date : todayStr(),
                description: "Opening Balances", ref: "OPENING-BAL", counterparty: "System", tags: "opening", isVoid: false, lines
              };
              saveTxn(newTxn);
              setTxns(p => { const i = p.findIndex(x => x.id === newTxn.id); return i >= 0 ? p.map(x => x.id === newTxn.id ? newTxn : x) : [...p, newTxn]; });
            } else if (existingOpenT) {
              // If they changed everything to 0, void the existing one
              saveTxn({ ...existingOpenT, isVoid: true });
              setTxns(p => p.map(x => x.id === existingOpenT.id ? { ...x, isVoid: true } : x));
            }
            toast("Settings & Balances saved ✅", "success");
          }}>💾 Save All Settings & Balances</button>
        </div>
      </div>;
    }

    function App({ userRole, userEmail }) {
      // Start with localStorage cache while Firestore loads
      const [accounts, setAccounts] = useState(() => ls_get("np_accounts", SEED_ACCOUNTS));
      const [txns, setTxns] = useState(() => ls_get("np_transactions", SEED_TRANSACTIONS));
      const [deals, setDeals] = useState(() => ls_get("np_deals", SEED_DEALS));
      const [invoices, setInvoices] = useState(() => ls_get("np_invoices", SEED_INVOICES));
      const [cheques, setCheques] = useState(() => ls_get("np_cheques", SEED_CHEQUES));
      const [customers, setCustomers] = useState(() => ls_get("np_customers", SEED_CUSTOMERS));
      const [vendors, setVendors] = useState(() => ls_get("np_vendors", SEED_VENDORS));
      const [brokers, setBrokers] = useState(() => ls_get("np_brokers", SEED_BROKERS));
      const [developers, setDevelopers] = useState(() => ls_get("np_developers", SEED_DEVELOPERS));
      const [settings, setSettings] = useState(() => ls_get("np_settings", { company: "Nasama Properties Company LLC", trn: "100-1234-5678-00003", vatRate: 5, currency: "AED" }));
      const [page, setPage] = useState("dashboard");
      const [reportTab, setReportTab] = useState(null); // For navigating to specific report tab
      const [dark, setDark] = useState(false);

      // Redirect secretary users from dashboard to deals page
      useEffect(() => {
        if (userRole === USER_ROLES.SECRETARY && page === 'dashboard') {
          setPage('deals');
        }
      }, [userRole, page]);
      const [srch, setSrch] = useState(""); const [sRes, setSRes] = useState([]);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [isMobile, setIsMobile] = useState(false);

      // Bottom navigation items for mobile
      const MOBILE_MAIN_PAGES = ['dashboard', 'deals', 'banking', 'reports', 'settings'];
      const isMobileMainPage = MOBILE_MAIN_PAGES.includes(page);
      const [fbLoaded, setFbLoaded] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [syncError, setSyncError] = useState(false);
      const syncCount = useRef(0);
      const demoClearedRef = useRef(false);

      // ── VAT ACCOUNT MIGRATION (ONE-TIME FIX) ────────────────────────────────
      useEffect(() => {
        const migrated = localStorage.getItem("np_vat_migrated");
        if (migrated === "true") return;

        const oldVATId = "a2100"; // Old single VAT account
        const outputVATId = "a2101"; // New Output VAT account
        const inputVATId = "a1201"; // New Input VAT account

        // Step 1: Migrate accounts array
        let accountsNeedSave = false;
        const migratedAccounts = accounts.filter(a => {
          if (a.id === oldVATId) {
            accountsNeedSave = true;
            return false; // Remove old account
          }
          return true;
        });

        // Add new accounts if they don't exist
        if (!migratedAccounts.find(a => a.id === inputVATId)) {
          migratedAccounts.push({
            id: inputVATId, code: "1201", name: "Input VAT Recoverable",
            type: "Asset", isBank: false, isReceivable: false, isPayable: false,
            isVATControl: false, isOutputVAT: false, isInputVAT: true
          });
          accountsNeedSave = true;
        }
        if (!migratedAccounts.find(a => a.id === outputVATId)) {
          migratedAccounts.push({
            id: outputVATId, code: "2101", name: "Output VAT Payable",
            type: "Liability", isBank: false, isReceivable: false, isPayable: false,
            isVATControl: false, isOutputVAT: true, isInputVAT: false
          });
          accountsNeedSave = true;
        }

        if (accountsNeedSave) {
          setAccounts(migratedAccounts);
          ls_set("np_accounts", migratedAccounts);
        }

        // Step 2: Migrate transactions
        let txnsNeedSave = false;
        const migratedTxns = txns.map(t => {
          const migratedLines = t.lines.map(l => {
            if (l.accountId === oldVATId) {
              txnsNeedSave = true;
              // If credit > 0, it's Output VAT (sales)
              // If debit > 0, it's Input VAT (purchases)
              return {
                ...l,
                accountId: (l.credit > 0) ? outputVATId : inputVATId
              };
            }
            return l;
          });
          return { ...t, lines: migratedLines };
        });

        if (txnsNeedSave) {
          console.log("Migrating VAT accounts from old single account to new Input/Output structure...");
          setTxns(migratedTxns);
          ls_set("np_transactions", migratedTxns);
        }

        localStorage.setItem("np_vat_migrated", "true");
        if (accountsNeedSave || txnsNeedSave) {
          setTimeout(() => toast("VAT accounts migrated successfully! ✅", "success"), 500);
        }
      }, []); // Run once on mount

      // ── MOBILE DETECTION ────────────────────────────────
      useEffect(() => {
        const handleResize = () => {
          const mobile = window.innerWidth <= 768;
          setIsMobile(mobile);
          if (!mobile) setMobileMenuOpen(false); // Close menu on desktop
        };
        handleResize(); // Check on mount
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // ── ONLINE/OFFLINE DETECTION ──────────────────────
      useEffect(() => {
        const handleOnline = () => {
          console.log('🌐 Back online!');
          toast('🌐 Back online - you can save changes now', 'success');

          // Clear sync error and reset to good state
          setSyncError(false);
          setSyncing(false);

          // Test Firebase connection
          db.collection('_connection_test').doc('test').set({
            timestamp: new Date().toISOString(),
            online: true
          })
            .then(() => {
              console.log('✅ Firebase connection verified');
            })
            .catch(err => {
              console.error('Firebase connection test failed:', err);
              // Keep error state if Firebase is still unreachable
              setSyncError(true);
              toast('⚠️ Online but Firebase unreachable', 'warning');
            });
        };

        const handleOffline = () => {
          console.log('📵 You are offline');
          toast('📵 You are offline - changes will not sync', 'warning');
          setSyncError(true);
          setSyncing(false);
        };

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

        // Check initial state
        if (!navigator.onLine) {
          setSyncError(true);
        }

        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // ── FIRESTORE REAL-TIME LISTENERS ──────────────────
      useEffect(() => {
        let mounted = true;
        const unsubscribers = [];

        // Safety fallback: never stay stuck — show the app after 10s no matter what
        const safetyTimer = setTimeout(() => {
          if (mounted) {
            console.warn('Firebase loading timeout - showing app anyway');
            setFbLoaded(true);
          }
        }, 10000);

        // First: check metadata to know if demo data was already cleared
        db.collection('metadata').doc('config').get().then(metaSnap => {
          if (!mounted) return; // Early exit if unmounted

          if (metaSnap.exists && metaSnap.data().demoCleared) {
            demoClearedRef.current = true;
          }

          let loaded = 0; const total = 8;
          const done = () => {
            loaded++;
            if (loaded >= total && mounted) setFbLoaded(true);
          };

          // If demo was NOT cleared yet and collection is empty → seed it
          // If demo WAS cleared → never auto-seed, just load whatever is there
          // FIX: Use atomic locking to prevent race conditions
          const mkListener = (col, setter, cacheKey, seed) => {
            return db.collection(col).onSnapshot(async (snap) => {
              if (snap.empty && !demoClearedRef.current) {
                // Use transaction-based locking to prevent multiple tabs from seeding
                const lockRef = db.collection('_seed_locks').doc(col);

                try {
                  // Atomic check-and-lock
                  const shouldSeed = await db.runTransaction(async (transaction) => {
                    const lockDoc = await transaction.get(lockRef);
                    const colCheck = await transaction.get(db.collection(col).limit(1));

                    // If lock exists or collection has data, skip
                    if (lockDoc.exists || !colCheck.empty) {
                      return false;
                    }

                    // Set lock
                    transaction.set(lockRef, {
                      locked: true,
                      at: new Date().toISOString(),
                      by: auth.currentUser?.uid || 'anonymous'
                    });

                    return true;
                  });

                  if (shouldSeed) {
                    // We have the lock, seed the data
                    await fsSetCollection(col, seed);
                    setter(seed);
                    ls_set(cacheKey, seed);

                    // Release lock after 5 seconds
                    setTimeout(() => {
                      lockRef.delete().catch(e => console.error('Lock cleanup:', e));
                    }, 5000);
                  } else {
                    // Another tab is seeding or data exists
                    setter([]);
                    ls_set(cacheKey, []);
                  }
                } catch (error) {
                  console.error(`Seeding error for ${col}:`, error);
                  setter([]);
                  ls_set(cacheKey, []);
                }
              } else {
                const data = snap.docs.map(d => d.data());
                setter(data);
                ls_set(cacheKey, data);
              }
              done();
            }, err => {
              console.error(col, err);
              toast(`Failed to load ${col}: ${err.message}`, 'error');
              done();
            });
          };

          const u1 = mkListener('accounts', setAccounts, 'np_accounts', SEED_ACCOUNTS);
          const u2 = mkListener('transactions', setTxns, 'np_transactions', SEED_TRANSACTIONS);
          const u3 = mkListener('deals', setDeals, 'np_deals', SEED_DEALS);
          const u4 = mkListener('invoices', setInvoices, 'np_invoices', SEED_INVOICES);
          const u5 = mkListener('cheques', setCheques, 'np_cheques', SEED_CHEQUES);
          const u6 = mkListener('customers', setCustomers, 'np_customers', SEED_CUSTOMERS);
          const u7 = mkListener('vendors', setVendors, 'np_vendors', SEED_VENDORS);
          const u8 = mkListener('brokers', setBrokers, 'np_brokers', SEED_BROKERS);
          const u9 = mkListener('developers', setDevelopers, 'np_developers', SEED_DEVELOPERS);

          unsubscribers.push(u1);
          unsubscribers.push(u2);
          unsubscribers.push(u3);
          unsubscribers.push(u4);
          unsubscribers.push(u5);
          unsubscribers.push(u6);
          unsubscribers.push(u7);
          unsubscribers.push(u8);
          unsubscribers.push(u9);

          // Settings is a single doc — done() MUST always be called
          const u10 = db.collection('settings').doc('company').onSnapshot(snap => {
            if (!mounted) return;

            if (snap.exists) {
              const d = snap.data(); setSettings(d); ls_set('np_settings', d);
            } else if (!demoClearedRef.current) {
              fsSaveSettings({ company: "Nasama Properties Company LLC", trn: "100-1234-5678-00003", vatRate: 5, currency: "AED" }).catch(console.error);
            }
            done(); // always called, every branch
          }, err => {
            console.error('settings', err);
            toast('Failed to load settings: ' + err.message, 'error');
            done();
          });

          unsubscribers.push(u10);
        }).catch(err => {
          console.error('metadata', err);
          toast('Failed to connect to database: ' + err.message, 'error');
          if (mounted) setFbLoaded(true);
        });

        // CLEANUP FUNCTION
        return () => {
          mounted = false;
          clearTimeout(safetyTimer);

          // Unsubscribe from all listeners
          unsubscribers.forEach(unsub => {
            try {
              unsub();
            } catch (error) {
              console.error('Cleanup error:', error);
            }
          });
        };
      }, []);

      // Helper to show sync indicator briefly
      const showSync = () => {
        setSyncing(true);
        syncCount.current++;
        const n = syncCount.current;
        setTimeout(() => { if (syncCount.current === n) setSyncing(false); }, 1800);
      };

      // ── FIRESTORE WRITE WRAPPERS ───────────────────────
      // These wrap the state setters to also persist to Firestore
      // FIX: Added rollback mechanism to prevent data loss
      const fsUpdate = (col, setter, cacheKey) => (updater) => {
        console.log(`🔄 fsUpdate called for ${col}`);
        setter(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          console.log(`📦 ${col} - prev length:`, prev.length, 'next length:', next.length);

          // Check if online before attempting save
          if (!navigator.onLine) {
            console.error('❌ OFFLINE - cannot save', col);
            toast(`❌ You're offline! Changes not saved to cloud.`, 'error');
            setSyncError(true);
            setSyncing(false);
            // Don't update state when offline
            return prev;
          }

          // Optimistically update local state
          ls_set(cacheKey, next);
          showSync();
          console.log(`💾 ${col} saved to localStorage`);

          // Attempt Firestore write with proper error handling
          fsSetCollection(col, next)
            .then(() => {
              console.log(`✅ ${col} synced to cloud successfully`);
              setSyncError(false); // Clear any previous errors
            })
            .catch(error => {
              console.error('❌ Firestore write error:', col, error);
              console.error('Error details:', error.message, error.code);

              // Show error to user
              toast(`❌ Failed to save ${col} to cloud: ${error.message}`, 'error');

              // Set sync error state (persists until next successful sync)
              setSyncError(true);
              setSyncing(false);

              // ROLLBACK: Revert to previous state
              console.warn('⚠️ ROLLBACK - reverting to previous state');
              setter(prev);
              ls_set(cacheKey, prev);
            });

          return next;
        });
      };

      // ── SMART DEAL UPSERT ─────────────────────────────
      // Instead of delete-all-then-rewrite (which triggers empty-collection re-seed),
      // we upsert only the changed/added documents one by one.
      const setDealsFS = (updater) => {
        setDeals(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;

          // Check if online before attempting save
          if (!navigator.onLine) {
            toast(`❌ You're offline! Deal changes not saved to cloud.`, 'error');
            setSyncError(true);
            setSyncing(false);
            return prev;
          }

          ls_set('np_deals', next);
          showSync();

          let hasError = false;

          // Upsert only docs that changed or were added
          const prevMap = Object.fromEntries(prev.map(d => [d.id, d]));
          next.forEach(deal => {
            const old = prevMap[deal.id];
            if (!old || JSON.stringify(old) !== JSON.stringify(deal)) {
              db.collection('deals').doc(deal.id).set(deal)
                .then(() => {
                  if (!hasError) setSyncError(false); // Clear errors on success
                })
                .catch(e => {
                  console.error('Deal upsert error', deal.id, e);
                  hasError = true;
                  setSyncError(true);
                  setSyncing(false);
                  toast(`❌ Failed to save deal to cloud: ${e.message}`, 'error');
                });
            }
          });

          // Delete docs removed from the array
          const nextIds = new Set(next.map(d => d.id));
          prev.filter(d => !nextIds.has(d.id)).forEach(deal => {
            db.collection('deals').doc(deal.id).delete()
              .catch(e => {
                console.error('Deal delete error', deal.id, e);
                hasError = true;
                setSyncError(true);
                setSyncing(false);
                toast(`❌ Failed to delete deal from cloud: ${e.message}`, 'error');
              });
          });

          return next;
        });
      };
      const setAccountsFS = fsUpdate('accounts', setAccounts, 'np_accounts');
      const setTxnsFS = fsUpdate('transactions', setTxns, 'np_transactions');
      const setInvoicesFS = fsUpdate('invoices', setInvoices, 'np_invoices');  // ✅ Now syncs to Firestore
      const setChequesFS = fsUpdate('cheques', setCheques, 'np_cheques');
      const setCustomersFS = fsUpdate('customers', setCustomers, 'np_customers');
      const setVendorsFS = fsUpdate('vendors', setVendors, 'np_vendors');
      const setBrokersFS = fsUpdate('brokers', setBrokers, 'np_brokers');
      const setDevelopersFS = fsUpdate('developers', setDevelopers, 'np_developers');
      const setSettingsFS = (val) => {
        const next = typeof val === 'function' ? val(settings) : val;

        // Check if online before attempting save
        if (!navigator.onLine) {
          toast(`❌ You're offline! Settings not saved to cloud.`, 'error');
          setSyncError(true);
          setSyncing(false);
          return;
        }

        setSettings(next);
        ls_set('np_settings', next);
        showSync();
        fsSaveSettings(next)
          .then(() => {
            setSyncError(false); // Clear errors on success
          })

            console.error('Firestore settings write error', e);

            setSyncing(false);
            toast(`❌ Failed to save settings to cloud: ${e.message}`, 'error');

      const ledger = useMemo(() => buildLedger(txns, accounts), [txns, accounts]);

          console.log('📊 Current transactions count:', p.length);
          const i = p.findIndex(x => x.id === t.id);
          const newTxns = i >= 0 ? p.map(x => x.id === t.id ? t : x) : [...p, t];
          console.log('✅ New transactions count:', newTxns.length, 'Action:', i >= 0 ? 'UPDATE' : 'ADD');
          return newTxns;
        });
      }, []);
      const journal = useMemo(() => createJournalEngine({ accounts, txns, saveTxn }), [accounts, txns, saveTxn]);

      useEffect(() => {
        const migrationKey = 'np_journal_engine_v1';
        if (localStorage.getItem(migrationKey) === 'true') return;

          );

      const deleteTxn = useCallback(id => { setTxnsFS(p => p.filter(t => t.id !== id)); }, []);

      // Global search
      useEffect(() => {
        if (!srch.trim()) { setSRes([]); return; }
        const q = srch.toLowerCase(); const r = [];
        txns.filter(t => t.description?.toLowerCase().includes(q) || t.ref?.toLowerCase().includes(q)).slice(0, 3).forEach(t => r.push({ type: "Txn", label: `${t.ref || ""} ${t.description}`, pg: "journal" }));
        invoices.filter(i => i.ref?.toLowerCase().includes(q)).slice(0, 3).forEach(i => r.push({ type: "Invoice", label: i.ref, pg: "invoices" }));
        customers.filter(c => c.name.toLowerCase().includes(q)).slice(0, 3).forEach(c => r.push({ type: "Customer", label: c.name, pg: "customers" }));
        deals.filter(d => d.property_name?.toLowerCase().includes(q)).slice(0, 2).forEach(d => r.push({ type: "Deal", label: d.property_name, pg: "deals" }));
        setSRes(r);
      }, [srch, txns, invoices, customers, deals]);

      const kpis = useMemo(() => {
        const banks = accounts.filter(a => a.isBank); const cash = banks.reduce((s, a) => s + accountBalance(a, ledger), 0);
        const arA = accounts.find(a => a.isReceivable); const ar = arA ? accountBalance(arA, ledger) : 0;
        const apA = accounts.find(a => a.isPayable); const ap = apA ? accountBalance(apA, ledger) : 0;

        // New VAT accounts
        const outputVATA = accounts.find(a => a.isOutputVAT); const inputVATA = accounts.find(a => a.isInputVAT);
        let outputVAT = outputVATA ? accountBalance(outputVATA, ledger) : 0;
        let inputVAT = inputVATA ? accountBalance(inputVATA, ledger) : 0;

        // OLD VAT account (backwards compatibility)
        const oldVATA = accounts.find(a => a.id === "a2100");
        if (oldVATA) {
          const oldBalance = accountBalance(oldVATA, ledger);
          // Old account balance is net (credits - debits)
          // Positive = output VAT collected (liability)
          if (oldBalance > 0) {
            outputVAT += oldBalance;
          } else {
            inputVAT += Math.abs(oldBalance);
          }
        }

        const vat = outputVAT - inputVAT; // Net VAT payable
        const ym = `${new Date().getFullYear()}`; // Match current year only (YTD)
        let rev = 0, exp = 0;
        txns.filter(t => !t.isVoid && t.date?.startsWith(ym)).forEach(t => t.lines.forEach(l => { const a = accounts.find(x => x.id === l.accountId); if (!a) return; if (a.type === "Revenue") rev += (l.credit - l.debit); if (a.type === "Expense") exp += (l.debit - l.credit); }));
        return { cash, ar, ap, vat, rev, exp };
      }, [accounts, txns, ledger]);

      const pendInv = invoices.filter(i => {
        // CRITICAL FIX: Use same validation as AR Aging
        if (i.status !== "Posted") return false;
        if (!i.txn_id) return false; // Must have transaction
        const txn = txns.find(t => t.id === i.txn_id);
        if (!txn) return false; // Transaction must exist
        if (txn.isVoid) return false; // Transaction must not be voided
        return true; // Valid open invoice
      }).length;
      const pendChq = cheques.filter(c => c.status === "Deposited").length;

      const shared = { accounts, setAccounts: setAccountsFS, txns, setTxns: setTxnsFS, deals, setDeals: setDealsFS, invoices, setInvoices: setInvoicesFS, cheques, setCheques: setChequesFS, customers, setCustomers: setCustomersFS, vendors, setVendors: setVendorsFS, brokers, setBrokers: setBrokersFS, developers, setDevelopers: setDevelopersFS, settings, setSettings: setSettingsFS, ledger, saveTxn, deleteTxn, journal, dark, setDark, reportTab, setReportTab, setPage };

      // ── CLEAR ALL DEMO DATA ──────────────────────────────
      const clearAllDemoData = async () => {
        try {
          // Instantly switch this flag locally
          demoClearedRef.current = true;
          // Set in firebase globally so NO other tabs re-seed
          await db.collection('metadata').doc('config').set({ demoCleared: true, clearedAt: new Date().toISOString() }, { merge: true });

          // Wipe everything except accounts (Chart of Accounts)
          const colsToClear = ['transactions', 'deals', 'invoices', 'cheques', 'customers', 'vendors', 'brokers', 'developers'];
          for (const col of colsToClear) {
            const snap = await db.collection(col).get();
            if (!snap.empty) {
              const batch = db.batch();
              snap.docs.forEach(d => batch.delete(d.ref));
              await batch.commit();
            }
          }

          // Update local state
          setTxns([]); setDeals([]); setInvoices([]); setCheques([]); setCustomers([]); setVendors([]); setBrokers([]); setDevelopers([]);
          // Clear local cache too
          ['np_transactions', 'np_deals', 'np_invoices', 'np_cheques', 'np_customers', 'np_vendors', 'np_brokers', 'np_developers'].forEach(k => ls_set(k, []));

          toast('Demo data cleared! You can now enter your real data 🚀', 'success');
        } catch (err) {
          console.error("Clear demo error:", err);
          toast("Failed to clear data: " + err.message, "error");
        }
      };

      // ── LOADING SCREEN ──────────────────────────────────
      if (!fbLoaded || !userRole) return (
        <div style={{ position: "fixed", inset: 0, background: NAVY, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20 }}>
          <Logo size={64} />
          <div style={{ color: GOLD, fontSize: 18, fontWeight: 700, letterSpacing: "0.05em" }}>NASAMA PROPERTIES</div>
          <div style={{ color: "#8B8BA8", fontSize: 13 }}>
            {!fbLoaded ? 'Connecting to Firebase…' : 'Loading user permissions…'}
          </div>
          <div style={{ width: 200, height: 3, background: "#2D2D45", borderRadius: 3, overflow: "hidden", marginTop: 8 }}>
            <div style={{ height: "100%", background: GOLD, borderRadius: 3, animation: "npLoad 1.4s ease-in-out infinite" }} />
          </div>
          <style>{`@keyframes npLoad{0%{width:0%}60%{width:90%}100%{width:100%}}`}</style>
        </div>
      );
      const emit = ev => document.dispatchEvent(new CustomEvent(ev));
      const addMap = { deals: () => emit("add-deal"), invoices: () => emit("add-invoice"), journal: () => emit("add-txn"), customers: () => emit("add-customer"), brokers: () => emit("add-broker"), developers: () => emit("add-developer"), vendors: () => emit("add-vendor"), cheques: () => emit("add-cheque"), coa: () => emit("add-account"), expenses: () => emit("add-expense"), banking: () => emit("add-bank-txn") };

      const renderPage = () => {
        const p = { ...shared, userRole, userEmail };
        switch (page) {
          case "dashboard": return <Dashboard {...p} kpis={kpis} pendInv={pendInv} pendChq={pendChq} setPage={setPage} setReportTab={setReportTab} />;
          case "coa": return <COAPage {...p} />;
          case "journal": return <JournalPage {...p} />;
          case "deals": return <DealsPage {...p} />;
          case "invoices": return <InvoicesPage {...p} />;
          case "customers": return <CustomersPage {...p} />;
          case "brokers": return <BrokersPage {...p} />;
          case "developers": return <DevelopersPage {...p} />;
          case "expenses": return <ExpensesPage {...p} />;
          case "vendors": return <VendorsPage {...p} />;
          case "banking": return <BankingPage {...p} />;
          case "cheques": return <ChequesPage {...p} />;
          case "reports": return <ReportsPage {...p} />;
          case "vat": return <VATPage {...p} />;
          case "selfcheck": return <SelfCheckPage {...p} />;
          case "manual": return <UserManualPage />;
          case "mobileinfo": return <MobileInfoPage />;
          case "users": return <UsersPage userRole={userRole} userEmail={userEmail} />;
          case "settings": return <SettingsPage {...p} onClearDemoData={clearAllDemoData} />;
          default: return <div style={{ textAlign: "center", padding: 60, color: "#6B7280", fontSize: 16 }}>🚧 Coming soon</div>;
        }
      };

      const navBg = dark ? "#0A0A14" : NAVY;
      const mainBg = dark ? "#111120" : "#F4F5F7";
      const headerBg = dark ? "#1A1A2E" : "#ffffff";
      const borderClr = dark ? "#2D2D45" : "#E5E7EB";

      return <div style={{ display: "flex", height: "100vh", fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif", fontSize: 14, background: mainBg, color: NAVY, overflow: "hidden" }}>

        {/* ── MOBILE OVERLAY (when menu open) ── */}
        {isMobile && mobileMenuOpen && (
          <div
            style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'rgba(0, 0, 0, 0.5)',
              zIndex: 999,
              backdropFilter: 'blur(2px)'
            }}
            onClick={() => setMobileMenuOpen(false)}
          />
        )}

        {/* ── SIDEBAR ── */}
        {(!isMobile || mobileMenuOpen) && (
          <div style={{
            width: isMobile ? '220px' : 232,
            minWidth: isMobile ? '220px' : 232,
            background: navBg,
            display: "flex",
            flexDirection: "column",
            overflowY: "auto",
            overflowX: "hidden",
            flexShrink: 0,
            position: isMobile ? 'fixed' : 'relative',
            left: 0,
            top: 0,
            bottom: 0,
            zIndex: 1000,
            boxShadow: isMobile ? '2px 0 10px rgba(0,0,0,0.3)' : 'none'
          }}>
            <div style={{ padding: "14px 14px 12px", borderBottom: `1px solid ${NAVY2}`, display: "flex", alignItems: "center", gap: 10, minHeight: 62, flexShrink: 0 }}>
              <Logo size={32} />
              <div><div style={{ color: GOLD, fontSize: 13, fontWeight: 700, letterSpacing: "0.02em", lineHeight: 1.2 }}>NASAMA</div><div style={{ color: "#8B8BA8", fontSize: 10 }}>Properties Accounting</div></div>
            </div>
            <nav style={{ padding: "6px 0", flex: 1 }}>
              {NAV.filter(item => !item.id || canAccessPage(userRole, item.id)).map((item, i) => {
                if (item.s) return <div key={i} style={{ padding: "12px 14px 4px", fontSize: 10, fontWeight: 600, color: "#4A4A6A", textTransform: "uppercase", letterSpacing: "0.08em" }}>{item.s}</div>;
                const badge = item.id === "invoices" ? pendInv : item.id === "cheques" ? pendChq : 0;
                const active = page === item.id;
                return <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 13px", cursor: "pointer", borderRadius: 7, margin: "1px 8px", color: active ? "#fff" : "#9090B8", background: active ? `linear-gradient(135deg,${GOLD},${GOLD_D})` : "transparent", fontSize: 13, transition: "all .15s", userSelect: "none" }} onClick={() => { setPage(item.id); if (isMobile) setMobileMenuOpen(false); }}>
                  <span style={{ fontSize: 14, flexShrink: 0 }}>{item.icon}</span>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{item.label}</span>
                  {badge > 0 && <span style={{ background: "#DC2626", color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 10, padding: "1px 6px", minWidth: 18, textAlign: "center", flexShrink: 0 }}>{badge}</span>}

            </nav>
            <div style={{ padding: "12px 14px", borderTop: `1px solid ${NAVY2}`, fontSize: 11, color: "#5A5A7A" }}>v1.0 · AED · UAE VAT 5%</div>
          </div>
        )}

        {/* Dark overlay when mobile menu open */}
        {isMobile && mobileMenuOpen && (
          <div
            onClick={() => setMobileMenuOpen(false)}
            style={{
              position: 'fixed',

            }}
