    // ╔══════════════════════════════════════════╗
    //  BANKING
    // ╚══════════════════════════════════════════╝
    function BankingPage({ accounts, txns, ledger, saveTxn, deleteTxn }) {
      const [bankId, setBankId] = useState(null); const [recon, setRecon] = useState(false);
      const [rd, setRd] = useState({ endDate: todayStr(), endBalance: "", cleared: {} });
      const [open, setOpen] = useState(false); const [preview, setPreview] = useState(false);
      const [pendTxn, setPendTxn] = useState(null); const [errs, setErrs] = useState([]);
      const [editTxn, setEditTxn] = useState(null); const [editErrs, setEditErrs] = useState([]);
      const [sortBy, setSortBy] = useState('date'); // 'date', 'description', 'ref', 'in', 'out'
      const [sortDesc, setSortDesc] = useState(true);
      const newBankRef = () => "BNK-" + new Date().getFullYear() + "-" + Math.floor(Math.random() * 9000 + 1000);
      const mkBlank = () => ({ type: "deposit", date: todayStr(), description: "", ref: newBankRef(), counterparty: "", amount: "", memo: "", offsetAccountId: "" });
      const [f, setF] = useState(mkBlank);
      const isBankOrCash = a => a.isBank || a.code === "1001" || a.name.toLowerCase().includes("cash");
      const banks = accounts.filter(isBankOrCash);
      useEffect(() => { if (banks.length && !bankId) setBankId(banks[0].id); }, [banks]);
      useEffect(() => {
        const h = () => { setF(mkBlank()); setErrs([]); setOpen(true); };
        document.addEventListener("add-bank-txn", h);
        return () => document.removeEventListener("add-bank-txn", h);
      }, []);

      const rows = useMemo(() => {
        let bal = 0;
        const filtered = txns.filter(t => !t.isVoid && t.lines.some(l => l.accountId === bankId));

        // Sort based on selected column
        const sorted = filtered.sort((a, b) => {
          let comparison = 0;
          if (sortBy === 'date') {
            comparison = a.date === b.date ? a.id.localeCompare(b.id) : (a.date > b.date ? 1 : -1);
          } else if (sortBy === 'description') {
            comparison = (a.description || '').localeCompare(b.description || '');
          } else if (sortBy === 'ref') {
            comparison = (a.ref || '').localeCompare(b.ref || '');
          } else if (sortBy === 'in') {
            // Sort by IN (Dr) amount - deposits/money in
            const aLine = a.lines.find(x => x.accountId === bankId);
            const bLine = b.lines.find(x => x.accountId === bankId);
            const aIn = (aLine?.debit || 0) - (aLine?.credit || 0);
            const bIn = (bLine?.debit || 0) - (bLine?.credit || 0);
            const aAmount = aIn > 0 ? aIn : 0;
            const bAmount = bIn > 0 ? bIn : 0;
            comparison = aAmount - bAmount;
          } else if (sortBy === 'out') {
            // Sort by OUT (Cr) amount - withdrawals/money out
            const aLine = a.lines.find(x => x.accountId === bankId);
            const bLine = b.lines.find(x => x.accountId === bankId);
            const aOut = (aLine?.debit || 0) - (aLine?.credit || 0);
            const bOut = (bLine?.debit || 0) - (bLine?.credit || 0);
            const aAmount = aOut < 0 ? Math.abs(aOut) : 0;
            const bAmount = bOut < 0 ? Math.abs(bOut) : 0;
            comparison = aAmount - bAmount;
          }
          return sortDesc ? -comparison : comparison;
        });

        return sorted.map(t => {
          const l = t.lines.find(x => x.accountId === bankId);
          const net = (l?.debit || 0) - (l?.credit || 0);
          bal += net;
          return { ...t, net, runBal: bal };
        });
      }, [txns, bankId, sortBy, sortDesc]);
      // FIX #4: Correct reconciliation — only include cleared items on/before statement end date
      const clearedSum = Object.entries(rd.cleared).filter(([, v]) => v).reduce((s, [id]) => {
        const r = rows.find(x => x.id === id);
        if (r && (!rd.endDate || r.date <= rd.endDate)) return s + r.net;
        return s;
      }, 0);
      const diff = toCents(rd.endBalance) - clearedSum;
      const bankAcct = accounts.find(a => a.id === bankId);

      const requestPost = () => {
        const es = [];
        if (!f.date) es.push("Date required");
        if (!f.description) es.push("Description required");
        if (!f.amount || parseFloat(f.amount) <= 0) es.push("Amount > 0 required");
        if (!f.offsetAccountId) es.push("Offset account required");
        if (!bankId) es.push("Select a bank account first");

        const vRate = parseFloat(f.vatRate) || 0;
        let outputVAT = null, inputVAT = null;
        if (vRate > 0 && f.type !== "transfer") {
          const vat = getVATAccounts(accounts);
          outputVAT = vat.outputVAT;
          inputVAT = vat.inputVAT;
          if (!outputVAT || !inputVAT) {
            es.push("VAT accounts not found in Chart of Accounts");
          }
        }

        setErrs(es); if (es.length) return;

        const amt = toCents(f.amount);
        let netC = amt;
        let vatC = 0;

        if (vRate > 0 && f.type !== "transfer") {
          // Assume the entered amount is the total inclusive of VAT
          netC = Math.round(amt / (1 + (vRate / 100)));
          vatC = amt - netC;
        }

        let lines;
        if (f.type === "deposit") {
          // Money IN: Dr Bank, Cr Offset (e.g. AR, Revenue)
          lines = [
            { id: uid(), accountId: bankId, debit: amt, credit: 0, memo: f.memo || f.description },
            { id: uid(), accountId: f.offsetAccountId, debit: 0, credit: netC, memo: f.memo || f.description },
          ];
          if (vatC > 0) lines.push({ id: uid(), accountId: outputVAT.id, debit: 0, credit: vatC, memo: `Output VAT ${vRate}%` });
        } else if (f.type === "withdrawal") {
          // Money OUT: Dr Offset (Expense), Cr Bank
          lines = [
            { id: uid(), accountId: f.offsetAccountId, debit: netC, credit: 0, memo: f.memo || f.description },
          ];
          if (vatC > 0) lines.push({ id: uid(), accountId: inputVAT.id, debit: vatC, credit: 0, memo: `Input VAT ${vRate}%` });
          lines.push({ id: uid(), accountId: bankId, debit: 0, credit: amt, memo: f.memo || f.description });
        } else {
          // Transfer: Dr Target Bank, Cr Source Bank
          lines = [
            { id: uid(), accountId: f.offsetAccountId, debit: amt, credit: 0, memo: `Transfer from ${bankAcct?.name}` },
            { id: uid(), accountId: bankId, debit: 0, credit: amt, memo: `Transfer to ${accounts.find(a => a.id === f.offsetAccountId)?.name}` },
          ];
        }
        const txn = { id: uid(), date: f.date, description: f.description, ref: f.ref || "", counterparty: f.counterparty || "", tags: "banking," + f.type, isVoid: false, lines };
        setPendTxn(txn); setPreview(true);
      };
      const confirm = () => {
        console.log('🏦 Banking confirm called');
        console.log('🏦 pendTxn:', pendTxn);
        saveTxn(pendTxn);
        setPreview(false);
        setOpen(false);
        toast("Bank transaction posted ✅", "success");
      };

      const typeLabel = { deposit: " Money In (Deposit)", withdrawal: " Money Out (Withdrawal)", transfer: " Transfer Between Banks" };
      const typeHint = {
        deposit: "Dr Bank → Cr Offset account (AR, Revenue, Equity…)",
        withdrawal: "Dr Offset account (Expense, AP…) → Cr Bank",
        transfer: "Dr Target Bank → Cr This Bank"
      };

      return <div>
        <PageHeader title="Banking" sub="Bank Register & Reconciliation">
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {banks.map(a => <button key={a.id} style={C.btn(bankId === a.id ? "primary" : "secondary", true)} onClick={() => setBankId(a.id)}>{a.name}</button>)}
          </div>
          <button style={C.btn("secondary")} onClick={() => setRecon(r => !r)}>{recon ? "✕ Close Reconcile" : "🔄 Reconcile"}</button>
          <button style={C.btn()} onClick={() => { setF(mkBlank()); setErrs([]); setOpen(true); }}>+ New Bank Transaction</button>
        </PageHeader>
        {recon && <div style={{ ...C.card, padding: 20, marginBottom: 16 }}>
          <div style={{ fontWeight: 700, marginBottom: 12, fontSize: 15 }}>🔄 Bank Reconciliation — {bankAcct?.name}</div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div><label style={C.label}>Statement End Date</label><input style={{ ...C.input, width: 170 }} type="date" value={rd.endDate} onChange={e => setRd(p => ({ ...p, endDate: e.target.value }))} /></div>
            <div><label style={C.label}>Statement Ending Balance (AED)</label><input style={{ ...C.input, width: 200 }} type="number" value={rd.endBalance} onChange={e => setRd(p => ({ ...p, endBalance: e.target.value }))} /></div>
            <div style={{ padding: "8px 16px", borderRadius: 8, fontWeight: 700, fontSize: 14, background: Math.abs(diff) < 1 ? "#ECFDF5" : "#FEF2F2", color: Math.abs(diff) < 1 ? "#059669" : "#DC2626" }}>Difference: {fmtAED(diff)} {Math.abs(diff) < 1 && "✅ RECONCILED"}</div>
          </div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 8 }}>
            ✓ Tick each transaction that appears on your bank statement up to the statement end date.<br/>
            <strong>How reconciliation works:</strong> Sum of cleared book items should equal the Statement Ending Balance.
            Difference = Statement Ending Balance − Cleared Items Total. When all items match, difference = 0.
          </div>
        </div>}
        <div style={C.card}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "13px 18px", borderBottom: "1px solid #E5E7EB" }}>
            <span style={{ fontWeight: 600, fontSize: 14 }}>{bankAcct?.name || "Register"}</span>
            <span style={{ fontWeight: 700, color: GOLD }}>{fmtAED(bankAcct ? accountBalance(bankAcct, ledger) : 0)}</span>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr>{recon && <th style={C.th}>✓</th>}<th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('date'); setSortDesc(sortBy === 'date' ? !sortDesc : true); }}>Date {sortBy === 'date' && (sortDesc ? "↓" : "↑")}</th><th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('description'); setSortDesc(sortBy === 'description' ? !sortDesc : true); }}>Description {sortBy === 'description' && (sortDesc ? "↓" : "↑")}</th><th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('ref'); setSortDesc(sortBy === 'ref' ? !sortDesc : true); }}>Ref {sortBy === 'ref' && (sortDesc ? "↓" : "↑")}</th><th style={{ ...C.th, textAlign: "right", color: "#2563EB", cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('in'); setSortDesc(sortBy === 'in' ? !sortDesc : true); }}>In (Dr) {sortBy === 'in' && (sortDesc ? "↓" : "↑")}</th><th style={{ ...C.th, textAlign: "right", color: "#DC2626", cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('out'); setSortDesc(sortBy === 'out' ? !sortDesc : true); }}>Out (Cr) {sortBy === 'out' && (sortDesc ? "↓" : "↑")}</th><th style={{ ...C.th, textAlign: "right" }}>Balance</th><th style={C.th}></th></tr></thead>
              <tbody>{rows.length === 0 && <tr><td colSpan={recon ? 8 : 7} style={{ ...C.td, textAlign: "center", color: "#6B7280", padding: 32 }}>No transactions yet. Click <strong>+ New Bank Transaction</strong> to add one.</td></tr>}{rows.map(r => <tr key={r.id}>
                {recon && <td style={C.td}><input type="checkbox" checked={!!rd.cleared[r.id]} onChange={e => setRd(p => ({ ...p, cleared: { ...p.cleared, [r.id]: e.target.checked } }))} style={{ width: 14, height: 14, accentColor: GOLD }} /></td>}
                <td style={{ ...C.td, whiteSpace: "nowrap" }}>{fmtDate(r.date)}</td>
                <td style={{ ...C.td, fontWeight: 500 }}>{r.description}</td>
                <td style={{ ...C.td, fontFamily: "monospace", fontSize: 12, color: GOLD_D }}>{r.ref || "—"}</td>
                <td style={{ ...C.td, textAlign: "right", color: "#2563EB", fontWeight: r.net > 0 ? 600 : 400, whiteSpace: "nowrap" }}>{r.net > 0 ? fmtAED(r.net) : "—"}</td>
                <td style={{ ...C.td, textAlign: "right", color: "#DC2626", fontWeight: r.net < 0 ? 600 : 400, whiteSpace: "nowrap" }}>{r.net < 0 ? fmtAED(-r.net) : "—"}</td>
                <td style={{ ...C.td, textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" }}>{fmtAED(r.runBal)}</td>
                <td style={{ ...C.td, textAlign: "right", whiteSpace: "nowrap" }}>
                  <button style={{ ...C.btn("secondary", true), padding: "4px 8px", marginRight: 6 }} onClick={() => {
                    const bankLine = r.lines.find(l => l.accountId === bankId);
                    // Find offset line (exclude bank account and VAT accounts)
                    const offsetLine = r.lines.find(l => {
                      const acct = accounts.find(a => a.id === l.accountId);
                      // Skip bank account
                      if (l.accountId === bankId) return false;
                      // Skip VAT accounts (check all VAT flags)
                      if (acct && (acct.isOutputVAT || acct.isInputVAT || acct.isVATControl || acct.id === "a2100" || acct.id === "a2101" || acct.id === "a1201")) return false;
                      return true;
                    });
                    setEditTxn({
                      id: r.id,
                      date: r.date,
                      description: r.description,
                      ref: r.ref || "",
                      counterparty: r.counterparty || "",
                      memo: offsetLine?.memo || "",
                      offsetAccountId: offsetLine?.accountId || "",
                      amount: fromCents(Math.abs((bankLine?.debit || 0) + (bankLine?.credit || 0))),
                      type: (bankLine?.debit || 0) > 0 ? "deposit" : "withdrawal",
                      lines: r.lines,
                      tags: r.tags || "banking"
                    });
                    setEditErrs([]);
                  }}>✏️ Edit</button>
                  <button style={{ ...C.btn("danger", true), padding: "4px 8px" }} onClick={() => {
                    // FIX #7: Void/Reverse instead of permanent delete to preserve audit trail
                    if (window.confirm("Void this transaction? A reversal entry will be posted to maintain audit trail. This cannot be undone.")) {
                      const rev = {
                        id: "_" + Math.random().toString(36).substr(2,9),
                        date: new Date().toISOString().split("T")[0],
                        description: "VOID: " + r.description,
                        ref: "VOID-" + (r.ref || r.id),
                        counterparty: r.counterparty || "",
                        tags: "void reversal",
                        isVoid: false,
                        lines: r.lines.map(l => ({ id: "_" + Math.random().toString(36).substr(2,9), accountId: l.accountId, debit: l.credit || 0, credit: l.debit || 0, memo: "Void: " + (l.memo || r.description) }))
                      };
                      saveTxn(rev);
                      saveTxn({ ...r, isVoid: true });
                      toast("Transaction voided with reversal entry ✅", "success");
                    }
                  }}>🚫 Void</button>
                </td>
              </tr>)}</tbody>
            </table>
          </div>
        </div>

        <Modal open={open} onClose={() => setOpen(false)} title="🏦 New Bank Transaction" width={580}
          footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={requestPost}>Preview & Post →</button></>}>
          {errs.length > 0 && <div style={C.err}>{errs.join(" · ")}</div>}
          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {["deposit", "withdrawal", "transfer"].map(t =>
              <button key={t} style={{ ...C.btn(f.type === t ? "primary" : "secondary", true), flex: 1, justifyContent: "center" }}
                onClick={() => setF(p => ({ ...p, type: t, offsetAccountId: t === "withdrawal" ? "a2001" : "" }))}>
                {t === "deposit" ? "⬇️ Money In" : t === "withdrawal" ? "⬆️ Money Out" : "⇄ Transfer"}
              </button>
            )}
          </div>
          <div style={{ ...C.warn, marginBottom: 14 }}><strong>{typeLabel[f.type]}:</strong> {typeHint[f.type]}</div>
          <FG>
            <FItem label="Bank Account">
              <input style={{ ...C.input, opacity: 0.7 }} value={bankAcct?.name || ""} disabled />
            </FItem>
            <FItem label={f.type === "transfer" ? "Transfer To Bank" : "Offset Account"} req>
              <Sel value={f.offsetAccountId} onChange={e => setF(p => ({ ...p, offsetAccountId: e.target.value }))}>
                <option value="">— Select Account —</option>
                {f.type === "transfer"
                  ? accounts.filter(a => isBankOrCash(a) && a.id !== bankId).map(a => <option key={a.id} value={a.id}>{a.name}</option>)
                  : <>
                    <optgroup label="Common">
                      {accounts.filter(a => a.isReceivable || a.isPayable || a.name.includes("Receivable") || a.name.includes("Payable") || a.id === "a1003" || a.id === "a2001").map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}
                    </optgroup>
                    {ACCT_TYPES.map(t => <optgroup key={t} label={t}>{accounts.filter(a => a.type === t && !isBankOrCash(a) && !(a.isReceivable || a.isPayable || a.name.includes("Receivable") || a.name.includes("Payable") || a.id === "a1003" || a.id === "a2001")).map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}</optgroup>)}
                  </>
                }
              </Sel>
            </FItem>
            <FItem label="Date" req><Inp type="date" value={f.date} onChange={e => setF(p => ({ ...p, date: e.target.value }))} /></FItem>
            <FItem label="Amount (AED) - Total" req><Inp type="number" value={f.amount} onChange={e => setF(p => ({ ...p, amount: e.target.value }))} /></FItem>
            {f.type !== "transfer" && <FItem label="VAT Rate % (Included)"><Inp type="number" value={f.vatRate || ""} onChange={e => setF(p => ({ ...p, vatRate: e.target.value }))} /></FItem>}
            <FItem label="Description" req full><Inp value={f.description} onChange={e => setF(p => ({ ...p, description: e.target.value }))} /></FItem>
            <FItem label="Reference"><Inp value={f.ref || ""} onChange={e => setF(p => ({ ...p, ref: e.target.value }))} /></FItem>
            <FItem label="Counterparty"><Inp value={f.counterparty || ""} onChange={e => setF(p => ({ ...p, counterparty: e.target.value }))} /></FItem>
            <FItem label="Memo"><Inp value={f.memo || ""} onChange={e => setF(p => ({ ...p, memo: e.target.value }))} /></FItem>
          </FG>
        </Modal>
        <PostingPreview open={preview} onClose={() => setPreview(false)} lines={pendTxn?.lines || []} accounts={accounts} onConfirm={confirm} header={pendTxn || {}} />

        <Modal open={!!editTxn} onClose={() => setEditTxn(null)} title="✏️ Edit Bank Transaction" width={560}
          footer={<><button style={C.btn("secondary")} onClick={() => setEditTxn(null)}>Cancel</button><button style={C.btn()} onClick={() => {
            if (!editTxn.date || !editTxn.description) { setEditErrs(["Date and Description required"]); return; }
            if (!editTxn.offsetAccountId) { setEditErrs(["Offset account required"]); return; }
            const amt = toCents(editTxn.amount);
            // FIX #3: detect VAT lines using isOutputVAT or isInputVAT (isVATControl is legacy only)
            const vatLine = editTxn.lines.find(l => {
              const acct = accounts.find(a => a.id === l.accountId);
              return acct && (acct.isVATControl || acct.isOutputVAT || acct.isInputVAT);
            });
            let newLines = [];
            const newMemo = editTxn.memo || editTxn.description;
            if (editTxn.type === "deposit") {
              newLines.push({ id: editTxn.lines[0]?.id || uid(), accountId: bankId, debit: amt, credit: 0, memo: newMemo });
              if (vatLine) {
                const netAmt = amt - (vatLine.credit || vatLine.debit || 0);
                newLines.push({ id: editTxn.lines[1]?.id || uid(), accountId: editTxn.offsetAccountId, debit: 0, credit: netAmt, memo: newMemo });
                newLines.push({ ...vatLine, memo: newMemo });
              } else {
                newLines.push({ id: editTxn.lines[1]?.id || uid(), accountId: editTxn.offsetAccountId, debit: 0, credit: amt, memo: newMemo });
              }
            } else {
              newLines.push({ id: editTxn.lines[0]?.id || uid(), accountId: editTxn.offsetAccountId, debit: amt, credit: 0, memo: newMemo });
              if (vatLine) {
                // withdrawal with vat: Dr Offset(net), Dr VAT(vat) -> Cr Bank(gross)
                const netAmt = amt - (vatLine.credit || vatLine.debit || 0);
                newLines[0].debit = netAmt;
                newLines.push({ ...vatLine, memo: newMemo });
              }
              newLines.push({ id: editTxn.lines[vatLine ? 2 : 1]?.id || uid(), accountId: bankId, debit: 0, credit: amt, memo: newMemo });
            }
            saveTxn({ ...editTxn, lines: newLines, isVoid: false, tags: editTxn.tags || "banking" });
            setEditTxn(null); toast("Transaction updated ✅", "success");
          }}>Save Changes</button></>}>
          {editErrs.length > 0 && <div style={C.err}>{editErrs.join(" · ")}</div>}
          <FG>
            <FItem label="Date" req><Inp type="date" value={editTxn?.date || ""} onChange={e => setEditTxn(p => ({ ...p, date: e.target.value }))} /></FItem>
            <FItem label="Amount (AED)" req><Inp type="number" value={editTxn?.amount || ""} onChange={e => setEditTxn(p => ({ ...p, amount: e.target.value }))} /></FItem>
            <FItem label="Offset Account" req>
              <Sel value={editTxn?.offsetAccountId || ""} onChange={e => setEditTxn(p => ({ ...p, offsetAccountId: e.target.value }))}>
                <option value="">— Select Account —</option>
                <optgroup label="Common — Revenue & Equity (for deposits)">{accounts.filter(a => (a.type === "Revenue" || a.type === "Equity") && !a.isBank).map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}</optgroup>
                    <optgroup label="Payables (for withdrawals)">{accounts.filter(a => a.isPayable).map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}</optgroup>
                    <optgroup label="⚠️ AR — Use only for customer receipt NOT linked to an invoice">{accounts.filter(a => a.isReceivable).map(a => <option key={a.id} value={a.id}>{a.code} — {a.name} (⚠️ prefer Receive Payment on invoice)</option>)}</optgroup>
                {ACCT_TYPES.map(t => <optgroup key={t} label={t}>{accounts.filter(a => a.type === t && !isBankOrCash(a) && !a.isReceivable && !a.isPayable).map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}</optgroup>)}
              </Sel>
            </FItem>
            <FItem label="Description" req full><Inp value={editTxn?.description || ""} onChange={e => setEditTxn(p => ({ ...p, description: e.target.value }))} /></FItem>
            <FItem label="Reference"><Inp value={editTxn?.ref || ""} onChange={e => setEditTxn(p => ({ ...p, ref: e.target.value }))} /></FItem>
            <FItem label="Counterparty"><Inp value={editTxn?.counterparty || ""} onChange={e => setEditTxn(p => ({ ...p, counterparty: e.target.value }))} /></FItem>
            <FItem label="Memo"><Inp value={editTxn?.memo || ""} onChange={e => setEditTxn(p => ({ ...p, memo: e.target.value }))} /></FItem>
          </FG>
        </Modal>
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  CHEQUES
    // ╚══════════════════════════════════════════╝
    function ChequesPage({ cheques, setCheques, accounts, saveTxn }) {
      const [open, setOpen] = useState(false); const [preview, setPreview] = useState(false);
      const [pendTxn, setPendTxn] = useState(null); const [pendCh, setPendCh] = useState(null);
      const blank = { direction: "received", cheque_no: "", bank: "", date: todayStr(), amount: "", counterparty: "", status: "Received", notes: "" };
      const [f, setF] = useState(blank);
      useEffect(() => { const h = () => { setF(blank); setOpen(true); }; document.addEventListener("add-cheque", h); return () => document.removeEventListener("add-cheque", h); }, []);
      const save = () => { if (!f.cheque_no || !f.amount) { toast("Cheque No. and Amount required", "error"); return; } setCheques(p => [...p, { ...f, id: "ch" + uid(), amount: toCents(f.amount), linkedTransactionIds: [] }]); setOpen(false); toast("Cheque registered ✅", "success"); };
      const changeStatus = (ch, ns) => {
        if (ns === "Bounced" && ch.direction === "received") {
          const bankA = accounts.find(a => a.isBank); const arA = accounts.find(a => a.isReceivable);
          if (bankA && arA) { const lines = [{ id: uid(), accountId: arA.id, debit: ch.amount, credit: 0, memo: `Bounce reversal — ${ch.cheque_no}` }, { id: uid(), accountId: bankA.id, debit: 0, credit: ch.amount, memo: `Cheque ${ch.cheque_no} bounced` }]; const txn = { id: uid(), date: todayStr(), description: `Cheque Bounce — ${ch.cheque_no}`, ref: ch.cheque_no, counterparty: ch.counterparty, tags: "cheque,bounce", isVoid: false, lines }; setPendTxn(txn); setPendCh({ ...ch, ns }); setPreview(true); return; }
        }
        setCheques(p => p.map(c => c.id === ch.id ? { ...c, status: ns } : c)); toast(`Cheque → ${ns}`, "success");
      };
      const confirmBounce = () => { saveTxn(pendTxn); setCheques(p => p.map(c => c.id === pendCh.id ? { ...c, status: "Bounced", linkedTransactionIds: [...c.linkedTransactionIds, pendTxn.id] } : c)); setPreview(false); toast("Bounce reversed & recorded ✅", "warning"); };
      const stMap = { received: ["Received", "Deposited", "Cleared", "Bounced"], issued: ["Issued", "Deposited", "Cleared", "Bounced"] };
      return <div>
        <PageHeader title="Cheques" sub={`${cheques.length} cheques`}>
          <button style={C.btn()} onClick={() => { setF(blank); setOpen(true); }}>+ Register Cheque</button>
        </PageHeader>
        <div style={C.card}><div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr><th style={C.th}>Cheque No.</th><th style={C.th}>Direction</th><th style={C.th}>Bank</th><th style={C.th}>Date</th><th style={C.th}>Counterparty</th><th style={{ ...C.th, textAlign: "right" }}>Amount</th><th style={C.th}>Status</th><th style={C.th}>Update</th></tr></thead>
            <tbody>{cheques.map(ch => <tr key={ch.id}>
              <td style={{ ...C.td, fontFamily: "monospace", fontWeight: 600 }}>{ch.cheque_no}</td>
              <td style={C.td}><span style={C.badge(ch.direction === "received" ? "success" : "info")}>{ch.direction === "received" ? "↓ Received" : "↑ Issued"}</span></td>
              <td style={C.td}>{ch.bank}</td><td style={{ ...C.td, whiteSpace: "nowrap" }}>{fmtDate(ch.date)}</td>
              <td style={C.td}>{ch.counterparty}</td>
              <td style={{ ...C.td, textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" }}>{fmtAED(ch.amount)}</td>
              <td style={C.td}><span style={C.badge({ Cleared: "success", Bounced: "danger", Deposited: "warning", Received: "info", Issued: "neutral" }[ch.status] || "neutral")}>{ch.status}</span></td>
              <td style={C.td}><select style={{ ...C.select, width: "auto", padding: "4px 8px", fontSize: 12 }} value={ch.status} onChange={e => changeStatus(ch, e.target.value)}>{(stMap[ch.direction] || []).map(s => <option key={s}>{s}</option>)}</select></td>
            </tr>)}</tbody>
          </table>
        </div></div>
        <Modal open={open} onClose={() => setOpen(false)} title="Register Cheque" width={520} footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={save}>Register</button></>}>
          <FG>
            <FItem label="Direction"><Sel value={f.direction} onChange={e => setF(p => ({ ...p, direction: e.target.value, status: e.target.value === "received" ? "Received" : "Issued" }))}><option value="received">↓ Received</option><option value="issued">↑ Issued</option></Sel></FItem>
            <FItem label="Cheque No." req><Inp value={f.cheque_no} onChange={e => setF(p => ({ ...p, cheque_no: e.target.value }))} /></FItem>
            <FItem label="Bank"><Inp value={f.bank} onChange={e => setF(p => ({ ...p, bank: e.target.value }))} /></FItem>
            <FItem label="Date"><Inp type="date" value={f.date} onChange={e => setF(p => ({ ...p, date: e.target.value }))} /></FItem>
            <FItem label="Amount (AED)" req><Inp type="number" value={f.amount} onChange={e => setF(p => ({ ...p, amount: e.target.value }))} /></FItem>
            <FItem label="Counterparty"><Inp value={f.counterparty} onChange={e => setF(p => ({ ...p, counterparty: e.target.value }))} /></FItem>
            <FItem label="Notes" full><Inp value={f.notes} onChange={e => setF(p => ({ ...p, notes: e.target.value }))} /></FItem>
          </FG>
        </Modal>
        <PostingPreview open={preview} onClose={() => setPreview(false)} lines={pendTxn?.lines || []} accounts={accounts} onConfirm={confirmBounce} header={pendTxn || {}} />
      </div>;
    }
  </script>
  <script type="text/babel">
    // ╔══════════════════════════════════════════╗
    //  AR SECTION (sub-component so hooks are valid)
    // ╚══════════════════════════════════════════╝
    function ARSection({ accounts, txns, invoices, setInvoices, deals, customers, saveTxn }) {
      const [rcptModal,    setRcptModal]    = useState(null);
      const [rcptForm,     setRcptForm]     = useState({ date: todayStr(), bankId: '', note: '' });
      const [rcptErr,      setRcptErr]      = useState('');
      const [submitting,   setSubmitting]   = useState(false);
      const [paidInvoices, setPaidInvoices] = useState(new Set()); // track locally paid this session

      const arAcct   = accounts.find(a => a.isReceivable);
      const bankAccts = accounts.filter(a => a.isBank || a.code === '1001');

      const allArLines = txns
        .filter(t => !t.isVoid)
        .flatMap(t => t.lines.map(l => ({ t, l, a: accounts.find(x => x.id === l.accountId) })))
        .filter(x => x.a && x.a.isReceivable)
        .sort((a, b) => a.t.date.localeCompare(b.t.date));

      const totalDebits  = allArLines.reduce((s, x) => s + (x.l.debit  || 0), 0);
      const totalCredits = allArLines.reduce((s, x) => s + (x.l.credit || 0), 0);
      const arBalance    = totalDebits - totalCredits;

      const openInvoices = invoices
        .filter(i => i.status === 'Posted' && i.txn_id)
        .filter(i => { const t = txns.find(x => x.id === i.txn_id); return t && !t.isVoid; })
        .map(i => {
          const grossC = toCents(i.totals?.gross || 0);
          let appliedC = 0;
          if (i.payment_txn_id) {
            const pt = txns.find(t => t.id === i.payment_txn_id && !t.isVoid);
            if (pt && arAcct) pt.lines.forEach(l => { if (l.accountId === arAcct.id) appliedC += (l.credit || 0); });
          }
          const openC = Math.max(0, grossC - appliedC);
          const days   = Math.floor((new Date() - new Date(i.date + 'T12:00:00')) / 86400000);
          const bucket = days <= 30 ? '0-30' : days <= 60 ? '31-60' : days <= 90 ? '61-90' : '90+';
          const deal     = deals.find(d => d.id === i.deal_id);
          const customer = customers.find(c => c.id === i.customer_id);
          return { ...i, openC, grossC, days, bucket, deal, customer };
        })
        .filter(i => i.openC > 1);

      const totalOpen = openInvoices.reduce((s, i) => s + i.openC, 0);
      const totalInvd = invoices.filter(i => i.status !== 'Void').reduce((s, i) => s + toCents(i.totals?.gross || 0), 0);
      const totalRcvd = invoices.filter(i => i.status === 'Paid').reduce((s, i) => s + toCents(i.totals?.gross || 0), 0);

      const handleReceivePayment = () => {
        setRcptErr('');
        if (submitting) return; // prevent double submission
        if (!rcptForm.date)   { setRcptErr('Date is required'); return; }
        if (!rcptForm.bankId) { setRcptErr('Select a bank account'); return; }
        if (!arAcct)          { setRcptErr('No AR account found in Chart of Accounts'); return; }
        const bankAcct = accounts.find(a => a.id === rcptForm.bankId);
        if (!bankAcct)        { setRcptErr('Bank account not found'); return; }

        setSubmitting(true); // disable confirm button immediately
        const invoiceId = rcptModal.invoiceId;
        const amt = rcptModal.amount;
        const txnId = '_' + Math.random().toString(36).substr(2, 9);
        const txn = {
          id: txnId,
          date: rcptForm.date,
          description: 'Receipt — ' + (rcptModal.customer || rcptModal.ref),
          ref: 'RCPT-' + rcptModal.ref,
          counterparty: rcptModal.customer || '',
          tags: 'receipt ar',
          isVoid: false,
          lines: [
            { id: '_' + Math.random().toString(36).substr(2, 9), accountId: bankAcct.id, debit: amt, credit: 0,   memo: 'Receipt: ' + rcptModal.ref },
            { id: '_' + Math.random().toString(36).substr(2, 9), accountId: arAcct.id,  debit: 0,   credit: amt, memo: 'Settle: '  + rcptModal.ref },
          ]
        };
        saveTxn(txn);
        // Mark invoice as Paid in the invoices state
        if (invoiceId && setInvoices) {
          setInvoices(p => p.map(i => i.id === invoiceId
            ? { ...i, status: 'Paid', payment_txn_id: txnId, paid_date: rcptForm.date }
            : i
          ));
        }
        // Track locally so button disables immediately even before state propagates
        setPaidInvoices(prev => new Set([...prev, invoiceId]));
        setRcptModal(null);
        setRcptForm({ date: todayStr(), bankId: '', note: '' });
        setSubmitting(false);
        toast('Payment received ✅', 'success');
      };

      return <div>
        {/* Summary Cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(160px,1fr))', gap: 12, marginBottom: 16 }}>
          {[
            { l: 'Total Invoiced',    v: fmtAED(totalInvd),       c: GOLD },
            { l: 'Total Received',    v: fmtAED(totalRcvd),       c: '#059669' },
            { l: 'Still Owed to You', v: fmtAED(totalOpen),       c: totalOpen > 1 ? '#D97706' : '#059669' },
            { l: 'Open Invoices',     v: openInvoices.length,     c: openInvoices.length > 0 ? '#D97706' : '#059669' },
            { l: 'AR Ledger Balance', v: fmtAED(arBalance),       c: arBalance < 0 ? '#DC2626' : '#059669' },
          ].map((k, i) => (
            <div key={i} style={{ ...C.card, padding: '14px 16px', borderTop: `3px solid ${k.c}` }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', color: '#6B7280', fontWeight: 600, marginBottom: 4 }}>{k.l}</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: k.l === 'AR Ledger Balance' && arBalance < 0 ? '#DC2626' : NAVY }}>{k.v}</div>
              {k.l === 'AR Ledger Balance' && arBalance < 0 && <div style={{ fontSize: 10, color: '#DC2626', marginTop: 2 }}>⚠️ Negative — check GL</div>}
            </div>
          ))}
        </div>

        {/* Awaiting Payment */}
        {openInvoices.length > 0 && <div style={{ ...C.card, marginBottom: 16 }}>
          <div style={{ padding: '13px 18px', borderBottom: '1px solid #E5E7EB', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <div>
              <span style={{ fontWeight: 700, fontSize: 15, color: '#D97706' }}>⏳ Awaiting Payment</span>
              <span style={{ marginLeft: 8, ...C.badge('warning') }}>{openInvoices.length} invoice{openInvoices.length !== 1 ? 's' : ''} outstanding</span>
            </div>
            <span style={{ fontWeight: 700, color: GOLD, fontSize: 14 }}>{fmtAED(totalOpen)} owed to you</span>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead><tr>
                <th style={C.th}>Invoice</th>
                <th style={C.th}>Date</th>
                <th style={C.th}>Customer</th>
                <th style={C.th}>Deal / Property</th>
                <th style={C.th}>Days</th>
                <th style={C.th}>Age</th>
                <th style={{ ...C.th, textAlign: 'right', color: GOLD_D }}>Invoice Total</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#D97706' }}>Still Owed</th>
                <th style={C.th}>Action</th>
              </tr></thead>
              <tbody>
                {openInvoices.map(i => {
                  const bucketColor = i.bucket === '0-30' ? 'success' : i.bucket === '31-60' ? 'warning' : 'danger';
                  return (
                    <tr key={i.id} style={{ background: i.days > 60 ? '#FFF5F5' : '#FFFBEB' }}>
                      <td style={{ ...C.td, fontFamily: 'monospace', fontWeight: 600, color: GOLD_D }}>{i.ref}</td>
                      <td style={{ ...C.td, whiteSpace: 'nowrap', fontSize: 12 }}>{fmtDate(i.date)}</td>
                      <td style={{ ...C.td, maxWidth: 130, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>{i.customer?.name || '—'}</td>
                      <td style={{ ...C.td, fontSize: 12, color: '#6B7280', maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{i.deal?.property_name || '—'}</td>
                      <td style={{ ...C.td, fontSize: 12 }}>{i.days}d</td>
                      <td style={C.td}><span style={C.badge(bucketColor)}>{i.bucket}</span></td>
                      <td style={{ ...C.td, textAlign: 'right', whiteSpace: 'nowrap' }}>{fmtAED(i.grossC)}</td>
                      <td style={{ ...C.td, textAlign: 'right', fontWeight: 700, color: '#D97706', whiteSpace: 'nowrap' }}>{fmtAED(i.openC)}</td>
                      <td style={C.td}>
                        {(() => {
                          const alreadyPaid = paidInvoices.has(i.id) || i.status === 'Paid';
                          // Check if a RCPT journal entry already exists for this invoice
                          const hasRcptInGL = txns.some(t =>
                            !t.isVoid && (
                              t.ref === ('RCPT-' + i.ref) ||
                              ((t.tags || '').includes('receipt') && t.description && t.description.includes(i.ref))
                            )
                          );
                          return (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                              <button
                                style={{ ...C.btn(alreadyPaid ? 'secondary' : 'primary', true), opacity: alreadyPaid ? 0.45 : 1, cursor: alreadyPaid ? 'not-allowed' : 'pointer' }}
                                disabled={alreadyPaid}
                                title={alreadyPaid ? 'Payment already received' : 'Receive payment for this invoice'}
                                onClick={() => {
                                  if (alreadyPaid) return;
                                  setRcptModal({ invoiceId: i.id, ref: i.ref, customer: i.customer?.name || '', amount: i.openC });
                                  setRcptForm({ date: todayStr(), bankId: bankAccts[0]?.id || '', note: '' });
                                  setRcptErr('');
                                }}
                              >
                                {alreadyPaid ? '✅ Paid' : '💰 Receive Payment'}
                              </button>
                              {!alreadyPaid && hasRcptInGL && (
                                <button
                                  style={{ ...C.btn('secondary', true), fontSize: 10, background: '#ECFDF5', color: '#059669', border: '1px solid #A7F3D0', whiteSpace: 'nowrap' }}
                                  title="RCPT journal already in GL — just update invoice status, no new journal"
                                  onClick={() => {
                                    if (!window.confirm('Mark as Paid without posting a journal? Only use this if a RCPT entry already exists in the General Ledger for this invoice.')) return;
                                    if (setInvoices) setInvoices(p => p.map(inv => inv.id === i.id ? { ...inv, status: 'Paid', paid_date: todayStr() } : inv));
                                    setPaidInvoices(prev => new Set([...prev, i.id]));
                                    toast('Invoice marked as Paid ✅ (no journal posted)', 'success');
                                  }}
                                >
                                  ✅ Mark Paid (RCPT exists)
                                </button>
                              )}
                            </div>
                          );
                        })()}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>}

        {openInvoices.length === 0 && <div style={{ ...C.card, padding: 24, textAlign: 'center', color: '#059669', fontWeight: 600, marginBottom: 16, fontSize: 14 }}>
          ✅ All invoices are collected — AR is clear
        </div>}

        {/* Full AR Ledger */}
        <div style={C.card}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '13px 18px', borderBottom: '1px solid #E5E7EB', flexWrap: 'wrap', gap: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontWeight: 600, fontSize: 15 }}>Full AR Ledger</span>
              {arBalance < 0 && <span style={C.badge('danger')}>⚠️ Negative — payments without invoices</span>}
            </div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead><tr>
                <th style={C.th}>Date</th>
                <th style={C.th}>Ref</th>
                <th style={C.th}>Customer</th>
                <th style={C.th}>Memo</th>
                <th style={C.th}>Type</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#2563EB' }}>Dr — Invoice</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#059669' }}>Cr — Receipt</th>
              </tr></thead>
              <tbody>
                {allArLines.length === 0 && <tr><td colSpan={7} style={{ ...C.td, textAlign: 'center', color: '#6B7280', padding: 24 }}>No AR transactions found</td></tr>}
                {allArLines.map((x, i) => {
                  const isBanking = (x.t.tags || '').includes('banking');
                  const isInvoice = (x.t.tags || '').includes('invoice');
                  const isReceipt = (x.t.tags || '').includes('receipt');
                  const tagColor  = isBanking ? 'danger' : isInvoice ? 'info' : isReceipt ? 'success' : 'neutral';
                  const tagLabel  = isBanking ? '⚠️ Direct' : isInvoice ? 'Invoice' : isReceipt ? 'Receipt' : x.t.tags || '—';
                  return (
                    <tr key={`${x.t.id}-${i}`} style={{ background: isBanking ? '#FEF2F2' : x.l.debit > 0 ? '#EFF6FF' : '#F0FFF4' }}>
                      <td style={{ ...C.td, whiteSpace: 'nowrap', fontSize: 12 }}>{fmtDate(x.t.date)}</td>
                      <td style={{ ...C.td, fontFamily: 'monospace', fontSize: 11, color: GOLD_D }}>{x.t.ref || '—'}</td>
                      <td style={{ ...C.td, maxWidth: 130, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>{x.t.counterparty || '—'}</td>
                      <td style={{ ...C.td, color: '#6B7280', fontSize: 12, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{x.l.memo || x.t.description}</td>
                      <td style={C.td}><span style={C.badge(tagColor)}>{tagLabel}</span></td>
                      <td style={{ ...C.td, textAlign: 'right', color: '#2563EB', fontWeight: x.l.debit > 0 ? 600 : 400, whiteSpace: 'nowrap' }}>{x.l.debit > 0 ? fmtAED(x.l.debit) : '—'}</td>
                      <td style={{ ...C.td, textAlign: 'right', color: isBanking && x.l.credit > 0 ? '#DC2626' : '#059669', fontWeight: x.l.credit > 0 ? 600 : 400, whiteSpace: 'nowrap' }}>
                        {x.l.credit > 0 ? fmtAED(x.l.credit) : '—'}
                        {isBanking && x.l.credit > 0 && <div style={{ fontSize: 10, color: '#DC2626' }}>no invoice</div>}
                      </td>
                    </tr>
                  );
                })}
                <tr style={{ background: '#F9FAFB', fontWeight: 700 }}>
                  <td colSpan={5} style={C.td}>TOTALS</td>
                  <td style={{ ...C.td, textAlign: 'right', color: '#2563EB', whiteSpace: 'nowrap' }}>{fmtAED(totalDebits)}</td>
                  <td style={{ ...C.td, textAlign: 'right', color: '#059669', whiteSpace: 'nowrap' }}>{fmtAED(totalCredits)}</td>
                </tr>
                <tr style={{ background: '#F9FAFB', fontWeight: 800 }}>
                  <td colSpan={5} style={{ ...C.td, fontSize: 13 }}>NET AR BALANCE (Debits − Credits)</td>
                  <td colSpan={2} style={{ ...C.td, textAlign: 'right', color: arBalance < 0 ? '#DC2626' : '#059669', fontSize: 14, whiteSpace: 'nowrap' }}>
                    {arBalance < 0 ? '⚠️ ' : ''}{fmtAED(arBalance)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* Receive Payment Modal */}
        {rcptModal && <div style={C.modal}>
          <div style={C.mbox(420)}>
            <div style={C.mhdr}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>💰 Receive Payment</span>
              <button style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: '#6B7280' }} onClick={() => setRcptModal(null)}>×</button>
            </div>
            <div style={C.mbdy}>
              <div style={{ background: '#FBF5DC', border: `1px solid ${GOLD}`, borderRadius: 8, padding: '12px 16px', marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: GOLD_D, fontWeight: 600, marginBottom: 4 }}>Invoice to Collect</div>
                <div style={{ fontWeight: 700, fontSize: 15, color: NAVY }}>{rcptModal.customer || rcptModal.ref}</div>
                <div style={{ fontSize: 12, color: '#6B7280', marginTop: 2 }}>Ref: {rcptModal.ref}</div>
                <div style={{ fontSize: 16, fontWeight: 800, color: GOLD_D, marginTop: 6 }}>{fmtAED(rcptModal.amount)}</div>
              </div>
              <div style={{ background: '#F0FFF4', border: '1px solid #A7F3D0', borderRadius: 8, padding: '12px 16px', marginBottom: 16, fontSize: 12 }}>
                <div style={{ fontWeight: 600, marginBottom: 6, color: '#059669' }}>Journal Entry that will be posted:</div>
                <div style={{ fontFamily: 'monospace', lineHeight: 1.8 }}>
                  <div><span style={{ color: '#2563EB', fontWeight: 600 }}>Dr</span>  Bank &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; {fmtAED(rcptModal.amount)}</div>
                  <div><span style={{ color: '#059669', fontWeight: 600 }}>Cr</span>  Accounts Receivable &nbsp; {fmtAED(rcptModal.amount)}</div>
                </div>
              </div>
              {rcptErr && <div style={C.err}>{rcptErr}</div>}
              <FG>
                <FItem label="Payment Date" req>
                  <Inp type="date" value={rcptForm.date} onChange={e => setRcptForm(p => ({ ...p, date: e.target.value }))} />
                </FItem>
                <FItem label="Received Into (Bank Account)" req>
                  <Sel value={rcptForm.bankId} onChange={e => setRcptForm(p => ({ ...p, bankId: e.target.value }))}>
                    <option value="">— Select Bank —</option>
                    {bankAccts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                  </Sel>
                </FItem>
              </FG>
            </div>
            <div style={C.mftr}>
              <button style={C.btn('secondary')} onClick={() => setRcptModal(null)}>Cancel</button>
              <button
                style={{ ...C.btn('primary'), opacity: submitting ? 0.5 : 1, cursor: submitting ? 'not-allowed' : 'pointer' }}
                disabled={submitting}
                onClick={handleReceivePayment}
              >
                {submitting ? '⏳ Processing…' : `✅ Confirm Receipt — ${fmtAED(rcptModal.amount)}`}
              </button>
            </div>
          </div>
        </div>}
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  AP SECTION (sub-component so hooks are valid)
    // ╚══════════════════════════════════════════╝
    function APSection({ accounts, txns, filtered, saveTxn }) {
      const [payModal, setPayModal] = useState(null);
      const [payForm,  setPayForm]  = useState({ date: todayStr(), bankId: '', note: '' });
      const [payErr,   setPayErr]   = useState('');

      const apAcct   = accounts.find(a => a.isPayable);
      const bankAccts = accounts.filter(a => a.isBank || a.code === '1001');

      const allApLines = filtered
        .flatMap(t => t.lines.map(l => ({ t, l, a: accounts.find(x => x.id === l.accountId) })))
        .filter(x => x.a && x.a.isPayable)
        .sort((a, b) => a.t.date.localeCompare(b.t.date));

      const totalBilled = allApLines.reduce((s, x) => s + (x.l.credit || 0), 0);
      const totalPaid   = allApLines.reduce((s, x) => s + (x.l.debit  || 0), 0);

      const billMap = {};
      allApLines.forEach(({ t, l }) => {
        if (l.credit > 0) {
          if (!billMap[t.id]) billMap[t.id] = { t, billed: 0, paid: 0 };
          billMap[t.id].billed += l.credit;
        }
      });
      allApLines.forEach(({ t, l }) => {
        if (l.debit > 0) {
          const vendorBills = Object.values(billMap).filter(b => b.t.counterparty === t.counterparty && b.paid < b.billed);
          vendorBills.sort((a, b) => a.t.date.localeCompare(b.t.date));
          let remaining = l.debit;
          for (const bill of vendorBills) {
            const canApply = Math.min(remaining, bill.billed - bill.paid);
            bill.paid += canApply;
            remaining -= canApply;
            if (remaining <= 0) break;
          }
        }
      });

      const openBills = Object.values(billMap).filter(b => b.paid < b.billed - 1);
      const totalOpen = openBills.reduce((s, b) => s + (b.billed - b.paid), 0);

      const handlePayBill = () => {
        setPayErr('');
        if (!payForm.date)   { setPayErr('Date is required'); return; }
        if (!payForm.bankId) { setPayErr('Select a bank account'); return; }
        if (!apAcct)         { setPayErr('No AP account found in Chart of Accounts'); return; }
        const bankAcct = accounts.find(a => a.id === payForm.bankId);
        if (!bankAcct)       { setPayErr('Bank account not found'); return; }
        const amt = payModal.amount;
        const txn = {
          id: '_' + Math.random().toString(36).substr(2, 9),
          date: payForm.date,
          description: 'Bill Payment — ' + (payModal.vendor || payModal.ref),
          ref: 'PAY-' + payModal.ref,
          counterparty: payModal.vendor || '',
          tags: 'ap payment',
          isVoid: false,
          lines: [
            { id: '_' + Math.random().toString(36).substr(2, 9), accountId: apAcct.id,    debit: amt, credit: 0,   memo: 'Pay bill: ' + payModal.ref },
            { id: '_' + Math.random().toString(36).substr(2, 9), accountId: bankAcct.id,  debit: 0,   credit: amt, memo: 'Pay bill: ' + payModal.ref },
          ]
        };
        saveTxn(txn);
        setPayModal(null);
        setPayForm({ date: todayStr(), bankId: '', note: '' });
      };

      return <div>
        {/* Summary Cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(160px,1fr))', gap: 12, marginBottom: 16 }}>
          {[
            { l: 'Total Billed', v: fmtAED(totalBilled), c: '#DC2626' },
            { l: 'Total Paid',   v: fmtAED(totalPaid),   c: '#059669' },
            { l: 'Still Owed',   v: fmtAED(totalOpen),   c: totalOpen > 1 ? '#D97706' : '#059669' },
            { l: 'Open Bills',   v: openBills.length,    c: openBills.length > 0 ? '#D97706' : '#059669' },
          ].map((k, i) => (
            <div key={i} style={{ ...C.card, padding: '14px 16px', borderTop: `3px solid ${k.c}` }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', color: '#6B7280', fontWeight: 600, marginBottom: 4 }}>{k.l}</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: NAVY }}>{k.v}</div>
            </div>
          ))}
        </div>

        {/* Unpaid Bills */}
        {openBills.length > 0 && <div style={{ ...C.card, marginBottom: 16 }}>
          <div style={{ padding: '13px 18px', borderBottom: '1px solid #E5E7EB', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <div>
              <span style={{ fontWeight: 700, fontSize: 15, color: '#D97706' }}>⚠️ Unpaid Bills</span>
              <span style={{ marginLeft: 8, ...C.badge('warning') }}>{openBills.length} bill{openBills.length !== 1 ? 's' : ''} outstanding</span>
            </div>
            <span style={{ fontWeight: 700, color: '#DC2626', fontSize: 14 }}>{fmtAED(totalOpen)} owed</span>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead><tr>
                <th style={C.th}>Date</th><th style={C.th}>Ref</th><th style={C.th}>Vendor / Broker</th>
                <th style={C.th}>Description</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#DC2626' }}>Billed</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#059669' }}>Paid</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#D97706' }}>Still Owed</th>
                <th style={C.th}>Action</th>
              </tr></thead>
              <tbody>
                {openBills.map(b => {
                  const owed = b.billed - b.paid;
                  return (
                    <tr key={b.t.id} style={{ background: '#FFFBEB' }}>
                      <td style={{ ...C.td, whiteSpace: 'nowrap' }}>{fmtDate(b.t.date)}</td>
                      <td style={{ ...C.td, fontFamily: 'monospace', fontSize: 12, color: GOLD_D }}>{b.t.ref || '—'}</td>
                      <td style={{ ...C.td, fontWeight: 600, maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.t.counterparty || '—'}</td>
                      <td style={{ ...C.td, color: '#6B7280', fontSize: 12, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.t.description}</td>
                      <td style={{ ...C.td, textAlign: 'right', color: '#DC2626', fontWeight: 600, whiteSpace: 'nowrap' }}>{fmtAED(b.billed)}</td>
                      <td style={{ ...C.td, textAlign: 'right', color: '#059669', whiteSpace: 'nowrap' }}>{b.paid > 0 ? fmtAED(b.paid) : '—'}</td>
                      <td style={{ ...C.td, textAlign: 'right', fontWeight: 700, color: '#D97706', whiteSpace: 'nowrap' }}>{fmtAED(owed)}</td>
                      <td style={C.td}>
                        <button style={C.btn('success', true)} onClick={() => {
                          setPayModal({ txnId: b.t.id, vendor: b.t.counterparty, amount: owed, ref: b.t.ref || b.t.id });
                          setPayForm({ date: todayStr(), bankId: bankAccts[0]?.id || '', note: '' });
                          setPayErr('');
                        }}>💳 Pay Bill</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>}

        {openBills.length === 0 && <div style={{ ...C.card, padding: 24, textAlign: 'center', color: '#059669', fontWeight: 600, marginBottom: 16, fontSize: 14 }}>
          ✅ All bills are paid — AP balance is clear
        </div>}

        {/* Full AP Ledger */}
        <div style={C.card}>
          <div style={{ padding: '13px 18px', borderBottom: '1px solid #E5E7EB', fontWeight: 600, fontSize: 15 }}>Full AP Ledger</div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead><tr>
                <th style={C.th}>Date</th><th style={C.th}>Ref</th><th style={C.th}>Vendor / Broker</th>
                <th style={C.th}>Memo</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#2563EB' }}>Dr — Payment</th>
                <th style={{ ...C.th, textAlign: 'right', color: '#DC2626' }}>Cr — Bill</th>
              </tr></thead>
              <tbody>
                {allApLines.length === 0 && <tr><td colSpan={6} style={{ ...C.td, textAlign: 'center', color: '#6B7280', padding: 24 }}>No AP transactions in this date range</td></tr>}
                {allApLines.map((x, i) => (
                  <tr key={`${x.t.id}-${i}`} style={{ background: x.l.credit > 0 ? '#FFF9F9' : '#F0FFF4' }}>
                    <td style={{ ...C.td, whiteSpace: 'nowrap' }}>{fmtDate(x.t.date)}</td>

                  <div><span style={{ color: '#059669', fontWeight: 600 }}>Cr</span>  Bank &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; {fmtAED(payModal.amount)}</div>

    // ╔══════════════════════════════════════════╗

    function ReportsPage({ accounts, txns, invoices, setInvoices, customers, deals, brokers, ledger, reportTab, setReportTab, saveTxn }) {
      const [active, setActive] = useState(reportTab || "pl");
      useEffect(() => {
        if (reportTab) { setActive(reportTab); setReportTab(null); }
      }, [reportTab, setReportTab]);
      const [from, setFrom] = useState("2024-01-01"); const [to, setTo] = useState(todayStr());
      const [glSortBy, setGlSortBy] = useState('date');
      const [glSortDesc, setGlSortDesc] = useState(false);
      const [glFilterAccount, setGlFilterAccount] = useState('');
      const [glFilterRef, setGlFilterRef] = useState('');
      const tabs = [{ id: "pl", l: "Profit & Loss" }, { id: "bs", l: "Balance Sheet" }, { id: "tb", l: "Trial Balance" }, { id: "ar", l: "AR Aging" }, { id: "ap", l: "Accounts Payable" }, { id: "gl", l: "General Ledger" }];
      const filtered = useMemo(() => {
        return txns.filter(t => !t.isVoid && t.date >= from && t.date <= to);
      }, [txns, from, to]);
      const glFiltered = useMemo(() => {
        let rows = txns.filter(t => !t.isVoid && t.date >= from && t.date <= to);
        if (glFilterAccount) rows = rows.filter(t => t.lines.some(l => l.accountId === glFilterAccount));
        if (glFilterRef.trim()) { const q = glFilterRef.trim().toLowerCase(); rows = rows.filter(t => (t.ref || '').toLowerCase().includes(q)); }
        return [...rows].sort((a, b) => {
          let comparison = 0;
          if (glSortBy === 'date') comparison = a.date === b.date ? a.id.localeCompare(b.id) : (a.date > b.date ? 1 : -1);
          else if (glSortBy === 'description') comparison = (a.description || '').localeCompare(b.description || '');
          else if (glSortBy === 'ref') comparison = (a.ref || '').localeCompare(b.ref || '');
          return glSortDesc ? -comparison : comparison;
        });
      }, [txns, from, to, glSortBy, glSortDesc, glFilterAccount, glFilterRef]);
      const dateLimitedLedger = useMemo(() => {
        const txnsUpToDate = txns.filter(t => !t.isVoid && t.date <= to);
        const ledger = {};
        txnsUpToDate.forEach(t => { t.lines.forEach(l => { if (!ledger[l.accountId]) ledger[l.accountId] = { debit: 0, credit: 0 }; ledger[l.accountId].debit += (l.debit || 0); ledger[l.accountId].credit += (l.credit || 0); }); });
        return ledger;
      }, [txns, to]);
      const pl = useMemo(() => { const rv = {}, ex = {}; filtered.forEach(t => t.lines.forEach(l => { const a = accounts.find(x => x.id === l.accountId); if (!a) return; if (a.type === "Revenue") { if (!rv[a.id]) rv[a.id] = { a, bal: 0 }; rv[a.id].bal += (l.credit - l.debit); } if (a.type === "Expense") { if (!ex[a.id]) ex[a.id] = { a, bal: 0 }; ex[a.id].bal += (l.debit - l.credit); } })); const tRev = Object.values(rv).reduce((s, x) => s + x.bal, 0); const tExp = Object.values(ex).reduce((s, x) => s + x.bal, 0); return { rev: Object.values(rv), exp: Object.values(ex), tRev, tExp, net: tRev - tExp }; }, [filtered, accounts]);
      const bs = useMemo(() => {
        const g = { Asset: [], Liability: [], Equity: [] };
        accounts.forEach(a => { if (!g[a.type]) return; g[a.type].push({ a, bal: accountBalance(a, dateLimitedLedger) }); });
        let cumulativeRevenue = 0; let cumulativeExpense = 0;
        accounts.forEach(a => { const ledgerEntry = dateLimitedLedger[a.id]; if (!ledgerEntry) return; if (a.type === "Revenue") cumulativeRevenue += (ledgerEntry.credit - ledgerEntry.debit); else if (a.type === "Expense") cumulativeExpense += (ledgerEntry.debit - ledgerEntry.credit); });
        const currentEarnings = cumulativeRevenue - cumulativeExpense;
        return { assets: g.Asset, liabs: g.Liability, equity: g.Equity, currentEarnings, tA: g.Asset.reduce((s, x) => s + x.bal, 0), tL: g.Liability.reduce((s, x) => s + x.bal, 0), tE: g.Equity.reduce((s, x) => s + x.bal, 0) + currentEarnings };
      }, [accounts, dateLimitedLedger]);
      const tb = useMemo(() => {
        const allAccountIds = Array.from(new Set([...accounts.map(a => a.id), ...Object.keys(dateLimitedLedger)]));
        const rows = allAccountIds.map(accountId => {
          const a = accounts.find(x => x.id === accountId) || { id: accountId, name: `Orphaned/Deleted Account (${accountId})`, code: "DEL", type: "Asset", isUnknown: true };
          const bal = accountBalance(a, dateLimitedLedger);
          const normalBal = NORMAL_BAL[a.type] || 'debit';
          let debit = 0, credit = 0;
          if (bal > 0) { if (normalBal === 'debit') debit = bal; else credit = bal; }
          else if (bal < 0) { if (normalBal === 'debit') credit = Math.abs(bal); else debit = Math.abs(bal); }
          return { a, debit, credit, bal };
        }).filter(r => r.bal !== 0 || !r.a.isUnknown);
        const tDr = rows.reduce((s, r) => s + r.debit, 0); const tCr = rows.reduce((s, r) => s + r.credit, 0);
        return { rows, tDr, tCr, ok: Math.abs(tDr - tCr) < 2 };
      }, [accounts, dateLimitedLedger]);
            const exportCSV = (data, name) => { if (!data.length) return; const h = Object.keys(data[0]).join(","); const r = data.map(x => Object.values(x).map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n"); const b = new Blob([h + "\n" + r], { type: "text/csv" }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = name + ".csv"; a.click(); toast("CSV exported ✅", "success"); };
      const tc = { Asset: "info", Liability: "danger", Equity: "gold", Revenue: "success", Expense: "warning" };
      return <div>
        <PageHeader title="Reports" />
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>

        </div>
        <div style={{ display: "flex", gap: 10, marginBottom: 18, alignItems: "center", background: "#fff", border: "1px solid #E5E7EB", borderRadius: 9, padding: "10px 16px", flexWrap: "wrap" }}>

          <label style={{ fontSize: 12, color: "#6B7280" }}>To</label><input style={{ ...C.input, width: 150 }} type="date" value={to} onChange={e => setTo(e.target.value)} />
        </div>

        {active === "pl" && <div style={C.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 18px", borderBottom: "1px solid #E5E7EB" }}>
            <span style={{ fontWeight: 600, fontSize: 15 }}>Profit & Loss — {from} to {to}</span>
            <button style={C.btn("secondary", true)} onClick={() => exportCSV([...pl.rev, ...pl.exp].map(x => ({ account: x.a.name, type: x.a.type, amount: fromCents(x.bal) })), "pl")}>Export CSV</button>
          </div>
          <div style={{ padding: "18px 24px" }}>
            <div style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", color: "#6B7280", marginBottom: 8, borderBottom: "2px solid #E5E7EB", paddingBottom: 4 }}>REVENUE</div>
            {pl.rev.map(r => <div key={r.a.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0 6px 20px", fontSize: 13, borderBottom: "1px solid #F3F4F6" }}><span>{r.a.name}</span><span style={{ fontWeight: 600, color: "#059669" }}>{fmtAED(r.bal)}</span></div>)}
            {pl.rev.length === 0 && <div style={{ padding: "8px 20px", color: "#6B7280", fontSize: 13 }}>No revenue in period</div>}
            <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 700, borderTop: "2px solid #E5E7EB", marginTop: 4 }}><span>Total Revenue</span><span style={{ color: "#059669" }}>{fmtAED(pl.tRev)}</span></div>
            <div style={{ height: 16 }} />
            <div style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", color: "#6B7280", marginBottom: 8, borderBottom: "2px solid #E5E7EB", paddingBottom: 4 }}>EXPENSES</div>
            {pl.exp.map(r => <div key={r.a.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0 6px 20px", fontSize: 13, borderBottom: "1px solid #F3F4F6" }}><span>{r.a.name}</span><span style={{ fontWeight: 600, color: "#D97706" }}>{fmtAED(r.bal)}</span></div>)}
            {pl.exp.length === 0 && <div style={{ padding: "8px 20px", color: "#6B7280", fontSize: 13 }}>No expenses in period</div>}
            <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 700, borderTop: "2px solid #E5E7EB", marginTop: 4 }}><span>Total Expenses</span><span style={{ color: "#D97706" }}>{fmtAED(pl.tExp)}</span></div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 0", fontWeight: 800, fontSize: 17, borderTop: `3px solid ${NAVY}`, marginTop: 8 }}><span>NET INCOME</span><span style={{ color: pl.net >= 0 ? "#059669" : "#DC2626" }}>{fmtAED(pl.net)}</span></div>
          </div>
        </div>}

        {active === "bs" && <div style={C.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 18px", borderBottom: "1px solid #E5E7EB" }}>
            <span style={{ fontWeight: 600, fontSize: 15 }}>Balance Sheet — As of {to}</span>
            <button style={C.btn("secondary", true)} onClick={() => exportCSV([...bs.assets, ...bs.liabs, ...bs.equity].map(x => ({ account: x.a.name, type: x.a.type, balance: fromCents(x.bal) })), "balance_sheet")}>Export CSV</button>
          </div>
          <div style={{ padding: "18px 24px" }}>
            {/* ASSETS */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", color: "#6B7280", marginBottom: 8, borderBottom: "2px solid #E5E7EB", paddingBottom: 4 }}>ASSETS</div>
              {bs.assets.map(r => <div key={r.a.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0 6px 20px", fontSize: 13, borderBottom: "1px solid #F3F4F6" }}><span>{r.a.name}</span><span style={{ fontWeight: 600 }}>{fmtAED(r.bal)}</span></div>)}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 700, borderTop: "2px solid #E5E7EB", marginTop: 4 }}><span>Total ASSETS</span><span style={{ color: "#2563EB" }}>{fmtAED(bs.tA)}</span></div>

              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 700, borderTop: "2px solid #E5E7EB", marginTop: 4 }}><span>Total LIABILITIES</span><span style={{ color: "#DC2626" }}>{fmtAED(bs.tL)}</span></div>

              <div style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", color: "#6B7280", marginBottom: 8, borderBottom: "2px solid #E5E7EB", paddingBottom: 4 }}>EQUITY</div>

              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0 6px 20px", fontSize: 13, borderBottom: "1px solid #F3F4F6", fontStyle: "italic", color: "#059669" }}><span>Current Earnings (Net Income)</span><span style={{ fontWeight: 600 }}>{fmtAED(bs.currentEarnings)}</span></div>

            </div>
          </div>
        </div>}

        {active === "ar" && <ARSection accounts={accounts} txns={txns} invoices={invoices} setInvoices={setInvoices} deals={deals} customers={customers} saveTxn={saveTxn} />}

        {active === "tb" && <div style={C.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 18px", borderBottom: "1px solid #E5E7EB" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontWeight: 600, fontSize: 15 }}>Trial Balance</span><span style={C.badge(tb.ok ? "success" : "danger")}>{tb.ok ? "✅ Balanced" : "❌ Out of Balance"}</span></div>
            <button style={C.btn("secondary", true)} onClick={() => exportCSV(tb.rows.map(r => ({ code: r.a.code, name: r.a.name, type: r.a.type, debit: fromCents(r.debit), credit: fromCents(r.credit), balance: fromCents(r.bal) })), "trial_balance")}>Export CSV</button>

          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr><th style={C.th}>Code</th><th style={C.th}>Account</th><th style={C.th}>Type</th><th style={{ ...C.th, textAlign: "right", color: "#2563EB" }}>Debits</th><th style={{ ...C.th, textAlign: "right", color: "#059669" }}>Credits</th><th style={{ ...C.th, textAlign: "right" }}>Balance</th></tr></thead>
              <tbody>
                {tb.rows.map(r => <tr key={r.a.id}><td style={{ ...C.td, fontFamily: "monospace", color: GOLD_D }}>{r.a.code}</td><td style={C.td}>{r.a.name}</td><td style={C.td}><span style={C.badge(tc[r.a.type] || "neutral")}>{r.a.type}</span></td><td style={{ ...C.td, textAlign: "right", color: "#2563EB", whiteSpace: "nowrap" }}>{r.debit > 0 ? fmtAED(r.debit) : "—"}</td><td style={{ ...C.td, textAlign: "right", color: "#059669", whiteSpace: "nowrap" }}>{r.credit > 0 ? fmtAED(r.credit) : "—"}</td><td style={{ ...C.td, textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" }}>{fmtAED(r.bal)}</td></tr>)}

            glFiltered.forEach(t => t.lines.forEach(l => {
              if (l.accountId === glFilterAccount)
                runBal += nb === 'debit' ? (l.debit - l.credit) : (l.credit - l.debit);

          return <div style={C.card}>

                      : t.lines;

                      return (
