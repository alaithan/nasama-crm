            }}><option value="">— Select —</option>{brokers.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</Sel></FItem>
            <FItem label="Commission Split %"><Inp type="number" min="0" max="100" value={f.commission_split !== undefined && f.commission_split !== null ? f.commission_split : 50} onChange={e => {
              const val = parseFloat(e.target.value);
              setF(p => ({ ...p, commission_split: isNaN(val) ? undefined : val }));
            }} /></FItem>

            {/* ── SECONDARY: Seller & Commission Split ── */}
            {f.type === "Secondary" && <>
              <div style={{ gridColumn: "1/-1", borderTop: "2px solid #FBF5DC", paddingTop: 10, marginTop: 4, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ background: "#FBF5DC", color: GOLD_D, fontWeight: 700, fontSize: 11, padding: "3px 10px", borderRadius: 20 }}>🟠 SECONDARY — Seller Details</span>
              </div>
              <FItem label="Client (Seller)" full>
                <Sel value={f.seller_id || ""} onChange={e => { const c = customers.find(x => x.id === e.target.value); setF(p => ({ ...p, seller_id: e.target.value, seller_name: c?.name || "" })); }}>
                  <option value="">— Select Seller —</option>
                  {customers.map(c => <option key={c.id} value={c.id}>{c.name}{c.phone ? ` · ${c.phone}` : ""}</option>)}
                </Sel>
                {f.seller_id && (() => { const c = customers.find(x => x.id === f.seller_id); return c ? <div style={{ fontSize: 11, color: "#6B7280", marginTop: 5, display: "flex", gap: 12 }}>{c.phone && <span>📞 {c.phone}</span>}{c.email && <span>✉️ {c.email}</span>}</div> : null; })()}
              </FItem>
              <FItem label="Contract No."><Inp value={f.contract_no || ""} placeholder="e.g. CF202601092830" onChange={e => setF(p => ({ ...p, contract_no: e.target.value }))} /></FItem>
              <FItem label="Purchase Price (AED)"><Inp type="number" value={f.transaction_value} onChange={e => setF(p => ({ ...p, transaction_value: e.target.value }))} /></FItem>
              <FItem label="Seller Comm %"><Inp type="number" min="0" max="100" step="0.1" placeholder="e.g. 2" value={f.seller_comm_pct || ""} onChange={e => { const pct = parseFloat(e.target.value) || 0; const tv = parseFloat(f.transaction_value) || 0; setF(p => ({ ...p, seller_comm_pct: e.target.value, seller_comm_amt: tv > 0 && pct > 0 ? (tv * pct / 100).toFixed(2) : p.seller_comm_amt })); }} /></FItem>
              <FItem label="Buyer Comm %"><Inp type="number" min="0" max="100" step="0.1" placeholder="e.g. 2" value={f.buyer_comm_pct || ""} onChange={e => { const pct = parseFloat(e.target.value) || 0; const tv = parseFloat(f.transaction_value) || 0; setF(p => ({ ...p, buyer_comm_pct: e.target.value, buyer_comm_amt: tv > 0 && pct > 0 ? (tv * pct / 100).toFixed(2) : p.buyer_comm_amt })); }} /></FItem>
              <FItem label="Seller Comm Amt (AED)"><Inp type="number" value={f.seller_comm_amt || ""} onChange={e => setF(p => ({ ...p, seller_comm_amt: e.target.value }))} /></FItem>
              <FItem label="Buyer Comm Amt (AED)"><Inp type="number" value={f.buyer_comm_amt || ""} onChange={e => setF(p => ({ ...p, buyer_comm_amt: e.target.value }))} /></FItem>
              <FItem label="Comm Discount (AED)"><Inp type="number" value={f.comm_discount || ""} placeholder="0" onChange={e => setF(p => ({ ...p, comm_discount: e.target.value }))} /></FItem>
              <FItem label="Total Comm Net (AED)" req>
                <Inp type="number" value={f.expected_commission_net} onChange={e => setF(p => ({ ...p, expected_commission_net: e.target.value }))} />
                {(f.seller_comm_amt || f.buyer_comm_amt) && <div style={{ fontSize: 11, color: "#059669", marginTop: 4, fontWeight: 600 }}>Seller: AED {parseFloat(f.seller_comm_amt || 0).toLocaleString()} + Buyer: AED {parseFloat(f.buyer_comm_amt || 0).toLocaleString()} − Discount: AED {parseFloat(f.comm_discount || 0).toLocaleString()} = AED {(parseFloat(f.seller_comm_amt || 0) + parseFloat(f.buyer_comm_amt || 0) - parseFloat(f.comm_discount || 0)).toLocaleString()}</div>}
              </FItem>
            </>}

            {/* ── OFF-PLAN: Transaction Value & Commission ── */}
            {f.type === "Off-Plan" && <>
              <div style={{ gridColumn: "1/-1", borderTop: "2px solid #EFF6FF", paddingTop: 10, marginTop: 4, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ background: "#EFF6FF", color: "#2563EB", fontWeight: 700, fontSize: 11, padding: "3px 10px", borderRadius: 20 }}>🔵 OFF-PLAN — Commission</span>
              </div>
              <FItem label="Transaction Value (AED)">
                <Inp type="number" value={f.transaction_value} onChange={e => { const tv = parseFloat(e.target.value) || 0; const pct = parseFloat(f.commission_pct) || 0; setF(p => ({ ...p, transaction_value: e.target.value, expected_commission_net: pct > 0 ? (tv * pct / 100).toFixed(2) : p.expected_commission_net })); }} />
              </FItem>
              <FItem label="Commission %">
                <Inp type="number" min="0" max="100" step="0.1" placeholder="e.g. 6" value={f.commission_pct} onChange={e => { const pct = parseFloat(e.target.value) || 0; const tv = parseFloat(f.transaction_value) || 0; setF(p => ({ ...p, commission_pct: e.target.value, expected_commission_net: tv > 0 && pct > 0 ? (tv * pct / 100).toFixed(2) : p.expected_commission_net })); }} />
              </FItem>
              <FItem label="Expected Commission Net (AED)" req>
                <Inp type="number" value={f.expected_commission_net} onChange={e => setF(p => ({ ...p, expected_commission_net: e.target.value }))} />
                {f.transaction_value && f.commission_pct && <div style={{ fontSize: 11, color: "#059669", marginTop: 4, fontWeight: 600 }}>= AED {(parseFloat(f.transaction_value) * parseFloat(f.commission_pct) / 100).toLocaleString("en-US", { minimumFractionDigits: 2 })} ({f.commission_pct}% of AED {parseFloat(f.transaction_value).toLocaleString()})</div>}
              </FItem>
              <FItem label="AML Screening No."><Inp value={f.aml_no || ""} placeholder="e.g. 1000057" onChange={e => setF(p => ({ ...p, aml_no: e.target.value }))} /></FItem>
              <FItem label="KYC Sent"><Sel value={f.kyc_sent || "NO"} onChange={e => setF(p => ({ ...p, kyc_sent: e.target.value }))}>
                <option value="YES">✅ YES — Sent</option><option value="NO">❌ NO</option>
              </Sel></FItem>
              <FItem label="KYC Received"><Sel value={f.kyc_received || "NO"} onChange={e => setF(p => ({ ...p, kyc_received: e.target.value }))}>
                <option value="YES">✅ YES — Received</option><option value="NO">❌ NO</option>
              </Sel></FItem>
            </>}

            {/* ── RENTAL: Lease Details ── */}
            {f.type === "Rental" && <>
              <div style={{ gridColumn: "1/-1", borderTop: "2px solid #ECFDF5", paddingTop: 10, marginTop: 4, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ background: "#ECFDF5", color: "#059669", fontWeight: 700, fontSize: 11, padding: "3px 10px", borderRadius: 20 }}>🟢 RENTAL — Lease Details</span>
              </div>
              <FItem label="Contract Type"><Sel value={f.contract_type || "1 Year Contract"} onChange={e => setF(p => ({ ...p, contract_type: e.target.value }))}>
                <option>1 Year Contract</option><option>2 Year Contract</option><option>3 Year Contract</option><option>Month-to-Month</option>
              </Sel></FItem>
              <FItem label="Annual Rent (AED)">
                <Inp type="number" value={f.transaction_value} onChange={e => { const tv = parseFloat(e.target.value) || 0; const pct = parseFloat(f.commission_pct) || 0; setF(p => ({ ...p, transaction_value: e.target.value, expected_commission_net: pct > 0 ? (tv * pct / 100).toFixed(2) : p.expected_commission_net })); }} />
              </FItem>
              <FItem label="Commission %">
                <Inp type="number" min="0" max="100" step="0.1" placeholder="e.g. 5" value={f.commission_pct} onChange={e => { const pct = parseFloat(e.target.value) || 0; const tv = parseFloat(f.transaction_value) || 0; setF(p => ({ ...p, commission_pct: e.target.value, expected_commission_net: tv > 0 && pct > 0 ? (tv * pct / 100).toFixed(2) : p.expected_commission_net })); }} />
              </FItem>
              <FItem label="Commission Net (AED)" req>
                <Inp type="number" value={f.expected_commission_net} onChange={e => setF(p => ({ ...p, expected_commission_net: e.target.value }))} />
              </FItem>
              <FItem label="Comm incl. VAT (AED)"><Inp type="number" value={f.comm_incl_vat || ""} onChange={e => setF(p => ({ ...p, comm_incl_vat: e.target.value }))} /></FItem>
              <FItem label="Rent Start Date"><Inp type="date" value={f.rent_start || ""} onChange={e => setF(p => ({ ...p, rent_start: e.target.value }))} /></FItem>
              <FItem label="Rent End Date"><Inp type="date" value={f.rent_end || ""} onChange={e => setF(p => ({ ...p, rent_end: e.target.value }))} /></FItem>
              <FItem label="Renewal Reminder (90 days before)"><Inp type="date" value={f.renewal_reminder || ""} onChange={e => setF(p => ({ ...p, renewal_reminder: e.target.value }))} /></FItem>
            </>}

            {/* ── NOTES ── */}
            <FItem label="Notes" full><Inp value={f.notes} onChange={e => setF(p => ({ ...p, notes: e.target.value }))} /></FItem>
          </FG>
          {!REV_STAGES.includes(f.stage || "Lead") && <div style={{ ...C.warn, marginTop: 14 }}>⚠️ Revenue recognition blocked at stage <strong>"{f.stage}"</strong>. Advance deal to "Commission Earned" to post revenue.</div>}
        </Modal>
        <PostingPreview
          open={preview}
          onClose={() => setPreview(false)}
          lines={pendTxn?.lines || []}
          accounts={accounts}
          onConfirm={confirmRequest}
          header={pendTxn || {}}
          confirmLabel="Submit Request"
        />
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  INVOICES
    // ╚══════════════════════════════════════════╝
    function InvoicesPage({ accounts, txns, setTxns, invoices, setInvoices, deals, customers, saveTxn, journal }) {
      const [open, setOpen] = useState(false); const [preview, setPreview] = useState(false);
      const [pendPost, setPendPost] = useState(null); const [filter, setFilter] = useState("All");
      const [sortBy, setSortBy] = useState('date'); // 'ref', 'date', 'customer', 'deal'
      const [sortDesc, setSortDesc] = useState(true);
      const newRef = () => "INV-" + new Date().getFullYear() + "-" + Math.floor(Math.random() * 9000 + 1000);
      const blLine = () => ({ id: uid(), desc: "Commission Income", net: "", vatRate: 5, vat: 0, gross: 0 });
      const [f, setF] = useState({ deal_id: "", customer_id: "", date: todayStr(), ref: newRef(), lines: [blLine()] });

      useEffect(() => { const h = () => { setF({ deal_id: "", customer_id: "", date: todayStr(), ref: newRef(), lines: [blLine()] }); setOpen(true); }; document.addEventListener("add-invoice", h); return () => document.removeEventListener("add-invoice", h); }, []);

      const setLine = (i, k, v) => setF(p => { const ls = [...p.lines]; const l = { ...ls[i], [k]: v }; if (k === "net" || k === "vatRate") { const n = parseFloat(k === "net" ? v : l.net) || 0, r = parseFloat(k === "vatRate" ? v : l.vatRate) || 0; l.vat = Math.round(n * r / 100 * 100) / 100; l.gross = Math.round((n + l.vat) * 100) / 100; } ls[i] = l; return { ...p, lines: ls }; });
      const tots = f.lines.reduce((s, l) => ({ net: s.net + (parseFloat(l.net) || 0), vat: s.vat + (parseFloat(l.vat) || 0), gross: s.gross + (parseFloat(l.gross) || 0) }), { net: 0, vat: 0, gross: 0 });

      const buildPost = (inv) => {
        const deal = deals.find(d => d.id === inv.deal_id);
        const customer = customers.find(c => c.id === inv.customer_id);
        try {
          const txn = (journal || createJournalEngine({ accounts, txns, saveTxn })).postInvoice({ invoice: inv, deal, customer, commit: false });
          return { txn, inv };
        } catch (err) {
          toast(err.message || "Failed to prepare invoice posting", "error");
          return null;
        }
      };

      const saveNew = () => {
        const inv = { id: uid(), ...f, lines: f.lines.map(l => ({ ...l, net: parseFloat(l.net) || 0, vat: parseFloat(l.vat) || 0, gross: parseFloat(l.gross) || 0 })), totals: tots, status: "Draft" };
        const post = buildPost(inv); if (!post) return; setPendPost(post); setPreview(true);
      };

      const confirmPost = () => {
        const { txn, inv } = pendPost; saveTxn(txn);
        setInvoices(p => { const e = p.find(i => i.id === inv.id); return e ? p.map(i => i.id === inv.id ? { ...i, status: "Posted", txn_id: txn.id } : i) : [...p, { ...inv, status: "Posted", txn_id: txn.id }]; });
        setPreview(false); setOpen(false); toast("Invoice posted ✅", "success");
      };

      const markPaid = id => {
        const invoice = invoices.find(i => i.id === id);
        if (!invoice) { toast("Invoice not found", "error"); return; }
        if (invoice.status !== "Posted") { toast("Only posted invoices can receive payment", "error"); return; }
        if (invoice.payment_txn_id) { toast("Receipt already exists for this invoice", "warning"); return; }

        const deal = deals.find(d => d.id === invoice.deal_id);
        const customer = customers.find(c => c.id === invoice.customer_id);
        const cashAccounts = accounts.filter(a => a.isBank || a.code === "1001" || (a.name || "").toLowerCase().includes("cash"));
        if (cashAccounts.length === 0) { toast("Missing Bank/Cash account in COA", "error"); return; }

        const defaultCode = cashAccounts[0].code;
        const chosenCode = cashAccounts.length === 1
          ? defaultCode
          : (prompt(`Receive into account code:\n${cashAccounts.map(a => `${a.code} = ${a.name}`).join("\n")}`, defaultCode) || defaultCode).trim();
        const payDate = (prompt("Payment date (YYYY-MM-DD)", todayStr()) || "").trim();
        if (!payDate) return;

        try {
          const txn = (journal || createJournalEngine({ accounts, txns, saveTxn })).postCashReceipt({
            invoice,
            deal,
            customer,
            bankCode: chosenCode,
            paymentDate: payDate,
            commit: true
          });
          setInvoices(p => p.map(i => i.id === id ? { ...i, status: "Paid", payment_txn_id: txn.id, paid_date: payDate } : i));
          toast("Receipt posted ✅", "success");
        } catch (err) {
          toast(err.message || "Failed to receive payment", "error");
        }
      };

      const voidInv = id => {
        const invoice = invoices.find(i => i.id === id);
        if (!invoice) return;
        // Void the invoice journal entry
        if (invoice.txn_id) {
          setTxns(p => p.map(t => t.id === invoice.txn_id ? { ...t, isVoid: true } : t));
        }
        // Void the linked payment receipt if one exists
        if (invoice.payment_txn_id) {
          setTxns(p => p.map(t => t.id === invoice.payment_txn_id ? { ...t, isVoid: true } : t));
        }
        // Mark invoice void
        setInvoices(p => p.map(i => i.id === id ? { ...i, status: "Void" } : i));
        // FIX #6: Roll back the linked deal revenue_status to prevent ghost-recognised deals.
        // Revert Recognised -> Approved so the deal can be re-invoiced or reviewed.
        if (invoice.deal_id) {
          setDeals(p => p.map(d => {
            if (d.id !== invoice.deal_id) return d;
            if (d.revenue_status === "Recognised") return { ...d, revenue_status: "Approved" };
            return d;
          }));
        }
        toast("Invoice voided — deal revenue status reset to Approved", "warning");
      };
      const postExisting = inv => { const post = buildPost(inv); if (!post) return; setPendPost(post); setPreview(true); };

      // Mark invoice as Paid status ONLY — no journal entry posted.
      // Use when payment journal already exists (RCPT in GL) but status was not updated.
      const markStatusPaidOnly = id => {
        if (!window.confirm("Mark this invoice as Paid?\n\nThis only updates the invoice status — it does NOT post a journal entry.\nOnly use this if you can see a RCPT entry in the General Ledger for this invoice.")) return;
        setInvoices(p => p.map(i => i.id === id ? { ...i, status: "Paid", paid_date: todayStr() } : i));
        toast("Invoice marked as Paid ✅ (no journal posted)", "success");
      };

      // Filter and sort invoices
      const filtered = filter === "All" ? invoices : invoices.filter(i => i.status === filter);
      const list = [...filtered].sort((a, b) => {
        let cmp = 0;
        if (sortBy === 'ref') {
          cmp = (a.ref || '').localeCompare(b.ref || '');
        } else if (sortBy === 'date') {
          cmp = (a.date || '').localeCompare(b.date || '');
        } else if (sortBy === 'customer') {
          const custA = customers.find(c => c.id === a.customer_id)?.name || '';
          const custB = customers.find(c => c.id === b.customer_id)?.name || '';
          cmp = custA.localeCompare(custB);
        } else if (sortBy === 'deal') {
          const dealA = deals.find(d => d.id === a.deal_id)?.property_name || '';
          const dealB = deals.find(d => d.id === b.deal_id)?.property_name || '';
          cmp = dealA.localeCompare(dealB);
        }
        return sortDesc ? -cmp : cmp;
      });

      return <div>
        <PageHeader title="Invoices" sub={`${invoices.length} total`}>
          {["All", "Draft", "Posted", "Paid", "Void"].map(s => <button key={s} style={{ ...C.btn(filter === s ? "primary" : "secondary", true) }} onClick={() => setFilter(s)}>{s}</button>)}
          <button style={C.btn()} onClick={() => { setF({ deal_id: "", customer_id: "", date: todayStr(), ref: newRef(), lines: [blLine()] }); setOpen(true); }}>+ New Invoice</button>
        </PageHeader>
        <div style={C.card}><div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr>
              <th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('ref'); setSortDesc(sortBy === 'ref' ? !sortDesc : true); }}>Ref {sortBy === 'ref' && (sortDesc ? "↓" : "↑")}</th>
              <th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('date'); setSortDesc(sortBy === 'date' ? !sortDesc : true); }}>Date {sortBy === 'date' && (sortDesc ? "↓" : "↑")}</th>
              <th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('customer'); setSortDesc(sortBy === 'customer' ? !sortDesc : true); }}>Customer {sortBy === 'customer' && (sortDesc ? "↓" : "↑")}</th>
              <th style={{ ...C.th, cursor: "pointer", userSelect: "none" }} onClick={() => { setSortBy('deal'); setSortDesc(sortBy === 'deal' ? !sortDesc : true); }}>Deal {sortBy === 'deal' && (sortDesc ? "↓" : "↑")}</th>
              <th style={{ ...C.th, textAlign: "right" }}>Net</th>
              <th style={{ ...C.th, textAlign: "right", color: "#7C3AED" }}>VAT</th>
              <th style={{ ...C.th, textAlign: "right" }}>Gross</th>
              <th style={C.th}>Status</th>
              <th style={C.th}>Actions</th>
            </tr></thead>
            <tbody>{list.map(inv => {
              const cust = customers.find(c => c.id === inv.customer_id);
              const deal = deals.find(d => d.id === inv.deal_id);
              return <tr key={inv.id}>
                <td style={{ ...C.td, fontFamily: "monospace", fontWeight: 600, color: GOLD_D, whiteSpace: "nowrap" }}>{inv.ref}</td>
                <td style={{ ...C.td, whiteSpace: "nowrap" }}>{fmtDate(inv.date)}</td>
                <td style={{ ...C.td, maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cust?.name || "—"}</td>
                <td style={{ ...C.td, maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12, color: "#6B7280" }}>{deal?.property_name || "—"}</td>
                <td style={{ ...C.td, textAlign: "right", whiteSpace: "nowrap" }}>{fmtAED(toCents(inv.totals?.net))}</td>
                <td style={{ ...C.td, textAlign: "right", color: "#7C3AED", whiteSpace: "nowrap" }}>{fmtAED(toCents(inv.totals?.vat))}</td>
                <td style={{ ...C.td, textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" }}>{fmtAED(toCents(inv.totals?.gross))}</td>
                <td style={C.td}><span style={C.badge({ Paid: "success", Posted: "info", Draft: "neutral", Void: "danger" }[inv.status] || "neutral")}>{inv.status}</span></td>
                <td style={C.td}><div style={{ display: "flex", gap: 4, flexWrap: "nowrap" }}>
                  {inv.status === "Draft" && <button style={C.btn("success", true)} onClick={() => postExisting(inv)}>Post</button>}
                  {inv.status === "Posted" && <button style={C.btn("primary", true)} onClick={() => markPaid(inv.id)}>💰 Receive Payment</button>}
                  {inv.status === "Posted" && (() => {
                    // Show "Mark Paid" only if a RCPT entry exists in txns for this invoice ref
                    const hasRcpt = txns.some(t => !t.isVoid && (t.ref === "RCPT-" + inv.ref || (t.tags || "").includes("receipt") && t.lines.some(l => { const a = accounts.find(x => x.id === l.accountId); return a && a.isReceivable && l.credit > 0; }) && t.description && t.description.includes(inv.ref)));
                    if (!hasRcpt) return null;
                    return <button style={{ ...C.btn("secondary", true), fontSize: 11, background: "#ECFDF5", color: "#059669", border: "1px solid #A7F3D0" }} onClick={() => markStatusPaidOnly(inv.id)} title="Payment already in GL — just update invoice status">✅ Mark Paid (no journal)</button>;
                  })()}
                  {inv.status !== "Void" && <button style={C.btn("danger", true)} onClick={() => voidInv(inv.id)}>Void</button>}
                </div></td>
              </tr>;
            })}</tbody>
          </table>
        </div></div>

        <Modal open={open} onClose={() => setOpen(false)} title="📄 New Invoice" width={800}
          footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={saveNew}>Preview & Post →</button></>}>
          <FG style={{ marginBottom: 14 }}>
            <FItem label="Date"><Inp type="date" value={f.date} onChange={e => setF(p => ({ ...p, date: e.target.value }))} /></FItem>
            <FItem label="Reference"><Inp value={f.ref} onChange={e => setF(p => ({ ...p, ref: e.target.value }))} /></FItem>
            <FItem label="Customer"><Sel value={f.customer_id} onChange={e => setF(p => ({ ...p, customer_id: e.target.value }))}><option value="">—</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</Sel></FItem>
            <FItem label="Deal *" req><Sel value={f.deal_id} onChange={e => { const d = deals.find(x => x.id === e.target.value); setF(p => ({ ...p, deal_id: e.target.value, customer_id: d?.customer_id || p.customer_id })); }}><option value="">— Select Deal —</option>{deals.map(d => <option key={d.id} value={d.id}>{d.property_name} [{d.stage}]</option>)}</Sel></FItem>
          </FG>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginBottom: 8 }}>
            <thead><tr style={{ background: "#F9FAFB" }}>{["Description", "Net (AED)", "VAT %", "VAT Amt", "Gross", ""].map((h, i) => <th key={i} style={C.th}>{h}</th>)}</tr></thead>
            <tbody>{f.lines.map((l, i) => <tr key={l.id}>
              <td style={{ padding: 4 }}><Inp value={l.desc} onChange={e => setLine(i, "desc", e.target.value)} /></td>
              <td style={{ padding: 4, width: 130 }}><input style={{ ...C.input, fontSize: 12 }} type="number" min="0" step="0.01" value={l.net} onChange={e => setLine(i, "net", e.target.value)} /></td>
              <td style={{ padding: 4, width: 70 }}><input style={{ ...C.input, fontSize: 12 }} type="number" min="0" max="100" step="0.5" value={l.vatRate} onChange={e => setLine(i, "vatRate", e.target.value)} /></td>
              <td style={{ padding: "4px 8px", color: "#7C3AED", fontWeight: 600, width: 100, whiteSpace: "nowrap" }}>{(l.vat || 0).toFixed(2)}</td>
              <td style={{ padding: "4px 8px", fontWeight: 700, width: 110, whiteSpace: "nowrap" }}>{(l.gross || 0).toFixed(2)}</td>
              <td style={{ padding: 4, width: 28 }}>{f.lines.length > 1 && <button style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 18 }} onClick={() => setF(p => ({ ...p, lines: p.lines.filter((_, j) => j !== i) }))}>×</button>}</td>
            </tr>)}</tbody>
          </table>
          <button style={{ ...C.btn("secondary", true), marginBottom: 14 }} onClick={() => setF(p => ({ ...p, lines: [...p.lines, blLine()] }))}>+ Add Line</button>
          <div style={{ background: "#F9FAFB", borderRadius: 8, padding: "12px 16px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, textAlign: "center" }}>
            <div><div style={{ fontSize: 11, color: "#6B7280", marginBottom: 4, fontWeight: 600, textTransform: "uppercase" }}>Net Amount</div><div style={{ fontWeight: 700, fontSize: 17 }}>{fmtAED(toCents(tots.net))}</div></div>
            <div><div style={{ fontSize: 11, color: "#7C3AED", marginBottom: 4, fontWeight: 600, textTransform: "uppercase" }}>VAT (5%)</div><div style={{ fontWeight: 700, fontSize: 17, color: "#7C3AED" }}>{fmtAED(toCents(tots.vat))}</div></div>
            <div><div style={{ fontSize: 11, color: GOLD_D, marginBottom: 4, fontWeight: 600, textTransform: "uppercase" }}>Gross Total</div><div style={{ fontWeight: 800, fontSize: 20, color: GOLD_D }}>{fmtAED(toCents(tots.gross))}</div></div>
          </div>
          {f.deal_id && !REV_STAGES.includes(deals.find(d => d.id === f.deal_id)?.stage) && <div style={{ ...C.warn, marginTop: 12 }}>⚠️ Deal stage "{deals.find(d => d.id === f.deal_id)?.stage}" — revenue posting blocked. Advance deal to "Commission Earned" first.</div>}
        </Modal>
        <PostingPreview open={preview} onClose={() => setPreview(false)} lines={pendPost?.txn?.lines || []} accounts={accounts} onConfirm={confirmPost} header={pendPost?.txn || {}} />
      </div>;
    }
  </script>
  <script type="text/babel">
    // ╔══════════════════════════════════════════╗
    //  BROKERS
    // ╚══════════════════════════════════════════╝
    function BrokersPage({ brokers, setBrokers, deals }) {
      const [open, setOpen] = useState(false); const [editId, setEditId] = useState(null);
      const blank = { name: "", nationality: "", phone: "", email: "", rera_no: "", rera_exp: "" };
      const [f, setF] = useState(blank);
      useEffect(() => { const h = () => { setEditId(null); setF(blank); setOpen(true); }; document.addEventListener("add-broker", h); return () => document.removeEventListener("add-broker", h); }, []);
      const save = () => {
        if (!f.name) { toast("Name required", "error"); return; }
        if (editId) {
          setBrokers(p => p.map(c => c.id === editId ? { ...c, ...f } : c));
        } else {
          setBrokers(p => [...p, { ...f, id: "BR" + Math.floor(Math.random() * 900 + 100) }]);
        }
        setOpen(false);
        toast("Broker saved ✅", "success");
      };
      const withRera = brokers.filter(b => b.rera_no).length;
      return <div>
        <PageHeader title="Brokers" sub={`${brokers.length} registered brokers · ${withRera} with RERA`}>
          <button style={C.btn()} onClick={() => { setEditId(null); setF(blank); setOpen(true); }}>+ New Broker</button>
        </PageHeader>
        <div style={C.card}><div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr>
              <th style={C.th}>ID</th>
              <th style={C.th}>Name</th>
              <th style={C.th}>Nationality</th>
              <th style={C.th}>Phone</th>
              <th style={C.th}>RERA No.</th>
              <th style={C.th}>RERA Expiry</th>
              <th style={C.th}>Deals</th>
              <th style={C.th}>Action</th>
            </tr></thead>
            <tbody>{brokers.map(b => {
              const od = deals.filter(i => i.broker_id === b.id).length;
              const reraExpDate = b.rera_exp ? new Date(b.rera_exp.split(".").reverse().join("-")) : null;
              const reraExpired = reraExpDate && reraExpDate < new Date();
              return <tr key={b.id}>
                <td style={{ ...C.td, fontFamily: "monospace", color: GOLD, whiteSpace: "nowrap" }}>{b.id}</td>
                <td style={{ ...C.td, fontWeight: 600 }}>{b.name}</td>
                <td style={{ ...C.td, fontSize: 12 }}>{b.nationality || "—"}</td>
                <td style={{ ...C.td, fontFamily: "monospace", fontSize: 12 }}>{b.phone || "—"}</td>
                <td style={{ ...C.td, fontFamily: "monospace", fontSize: 12 }}>{b.rera_no ? <span style={C.badge("gold")}>{b.rera_no}</span> : <span style={{ color: "#9CA3AF" }}>—</span>}</td>
                <td style={C.td}>{b.rera_exp ? <span style={C.badge(reraExpired ? "danger" : "success")}>{reraExpired ? "❌ " : "✅ "}{b.rera_exp}</span> : <span style={{ color: "#9CA3AF" }}>—</span>}</td>
                <td style={C.td}>{od > 0 ? <span style={C.badge("info")}>{od}</span> : "—"}</td>
                <td style={C.td}><button style={C.btn("secondary", true)} onClick={() => { setEditId(b.id); setF({ ...b }); setOpen(true); }}>Edit</button></td>
              </tr>;
            })}
            </tbody>
          </table>
        </div></div>
        <Modal open={open} onClose={() => setOpen(false)} title={`${editId ? "Edit" : "New"} Broker`} width={560} footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={save}>Save</button></>}>
          <FG>
            <FItem label="Full Name" req full><Inp value={f.name} onChange={e => setF(p => ({ ...p, name: e.target.value }))} /></FItem>
            <FItem label="Nationality"><Inp value={f.nationality || ""} onChange={e => setF(p => ({ ...p, nationality: e.target.value }))} /></FItem>
            <FItem label="Phone"><Inp value={f.phone || ""} onChange={e => setF(p => ({ ...p, phone: e.target.value }))} /></FItem>
            <FItem label="Email"><Inp value={f.email || ""} onChange={e => setF(p => ({ ...p, email: e.target.value }))} /></FItem>
            <FItem label="RERA No."><Inp value={f.rera_no || ""} onChange={e => setF(p => ({ ...p, rera_no: e.target.value }))} /></FItem>
            <FItem label="RERA Expiry (DD.MM.YYYY)"><Inp value={f.rera_exp || ""} placeholder="e.g. 14.06.2026" onChange={e => setF(p => ({ ...p, rera_exp: e.target.value }))} /></FItem>
          </FG>
        </Modal>
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  DEVELOPERS
    // ╚══════════════════════════════════════════╝
    function DevelopersPage({ developers, setDevelopers, deals }) {
      const [open, setOpen] = useState(false); const [editId, setEditId] = useState(null);
      const blank = { name: "", contact_person: "", email: "", phone: "", signed_agreement: false, expiry_date: "" };
      const [f, setF] = useState(blank);
      useEffect(() => { const h = () => { setEditId(null); setF(blank); setOpen(true); }; document.addEventListener("add-developer", h); return () => document.removeEventListener("add-developer", h); }, []);
      const save = () => {
        if (!f.name) { toast("Name required", "error"); return; }
        if (editId) {
          setDevelopers(p => p.map(c => c.id === editId ? { ...c, ...f } : c));
        } else {
          setDevelopers(p => [...p, { ...f, id: "dev" + uid() }]);
        }
        setOpen(false);
        toast("Developer saved ✅", "success");
      };
      const signed = developers.filter(d => d.signed_agreement).length;
      return <div>
        <PageHeader title="Developers" sub={`${developers.length} developers · ${signed} signed agreements`}>
          <button style={C.btn()} onClick={() => { setEditId(null); setF(blank); setOpen(true); }}>+ New Developer</button>
        </PageHeader>
        <div style={C.card}><div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr>
              <th style={C.th}>Developer Name</th>
              <th style={C.th}>Signed Agreement</th>
              <th style={C.th}>Expiry Date</th>
              <th style={C.th}>Contact</th>
              <th style={C.th}>Deals</th>
              <th style={C.th}>Action</th>
            </tr></thead>
            <tbody>{developers.map(c => {
              const od = deals.filter(i => i.developer_id === c.id || i.developer === c.name).length;
              const isExpired = c.expiry_date && c.expiry_date !== "No expiry - Till execution" && new Date(c.expiry_date) < new Date();
              return <tr key={c.id}>
                <td style={{ ...C.td, fontWeight: 600 }}>{c.name}</td>
                <td style={C.td}><span style={C.badge(c.signed_agreement ? "success" : "neutral")}>{c.signed_agreement ? "✅ Signed" : "⬜ Not Signed"}</span></td>
                <td style={C.td}><span style={C.badge(isExpired ? "danger" : c.expiry_date === "No expiry - Till execution" ? "gold" : c.expiry_date ? "info" : "neutral")}>{c.expiry_date ? (c.expiry_date === "No expiry - Till execution" ? "♾ No Expiry" : (isExpired ? "❌ " : "") + fmtDate(c.expiry_date)) : "—"}</span></td>
                <td style={{ ...C.td, fontSize: 12, color: "#6B7280" }}>{c.contact_person || c.email || c.phone || "—"}</td>
                <td style={C.td}>{od > 0 ? <span style={C.badge("info")}>{od}</span> : "—"}</td>
                <td style={C.td}><button style={C.btn("secondary", true)} onClick={() => { setEditId(c.id); setF({ ...c }); setOpen(true); }}>Edit</button></td>
              </tr>;
            })}
            </tbody>
          </table>
        </div></div>
        <Modal open={open} onClose={() => setOpen(false)} title={`${editId ? "Edit" : "New"} Developer`} width={520} footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={save}>Save</button></>}>
          <FG>
            <FItem label="Developer Name" req full><Inp value={f.name} onChange={e => setF(p => ({ ...p, name: e.target.value }))} /></FItem>
            <FItem label="Signed Agreement">
              <select style={C.select} value={f.signed_agreement ? "yes" : "no"} onChange={e => setF(p => ({ ...p, signed_agreement: e.target.value === "yes" }))}>
                <option value="yes">✅ Yes — Signed</option>
                <option value="no">⬜ No</option>
              </select>
            </FItem>
            <FItem label="Expiry Date"><Inp type="date" value={f.expiry_date === "No expiry - Till execution" ? "" : (f.expiry_date || "")} onChange={e => setF(p => ({ ...p, expiry_date: e.target.value }))} /></FItem>
            <FItem label="Contact Person"><Inp value={f.contact_person || ""} onChange={e => setF(p => ({ ...p, contact_person: e.target.value }))} /></FItem>
            <FItem label="Email"><Inp value={f.email || ""} onChange={e => setF(p => ({ ...p, email: e.target.value }))} /></FItem>
            <FItem label="Phone"><Inp value={f.phone || ""} onChange={e => setF(p => ({ ...p, phone: e.target.value }))} /></FItem>
          </FG>
        </Modal>
      </div>;
    }

    // ╔══════════════════════════════════════════╗
    //  CUSTOMERS
    // ╚══════════════════════════════════════════╝
    function CustomersPage({ customers, setCustomers, invoices }) {
      const [open, setOpen] = useState(false); const [editId, setEditId] = useState(null);
      const blank = { name: "", nationality: "", email: "", phone: "", trn: "", address: "" };
      const [f, setF] = useState(blank);

    function ExpensesPage({ accounts, txns, vendors, saveTxn }) {
      const [open, setOpen] = useState(false); const [preview, setPreview] = useState(false);
      const [pendTxn, setPendTxn] = useState(null); const [mode, setMode] = useState("expense");
      const newExpRef = () => "EXP-" + new Date().getFullYear() + "-" + Math.floor(Math.random() * 9000 + 1000);
      const mkBlank = () => ({ date: todayStr(), description: "", payee_id: "", pay_account_id: "", expense_account_id: "", amount: "", vatRate: 5, memo: "", ref: newExpRef() });
      const [f, setF] = useState(mkBlank()); const [errs, setErrs] = useState([]);
      useEffect(() => { const h = () => { setF(mkBlank()); setErrs([]); setOpen(true); }; document.addEventListener("add-expense", h); return () => document.removeEventListener("add-expense", h); }, []);
      const bankAccts = accounts.filter(a => a.isBank || a.code === "1001");
      const expAccts = accounts.filter(a => a.type === "Expense");
      const apAcct = accounts.find(a => a.isPayable);
      const requestPost = () => {
        const es = [];
        if (!f.date) es.push("Date required"); if (!f.expense_account_id) es.push("Category required");
        if (!f.amount || parseFloat(f.amount) <= 0) es.push("Amount > 0 required");
        if (mode === "expense" && !f.pay_account_id) es.push("Payment account required");
        setErrs(es); if (es.length) return;
        const amtC = toCents(f.amount);
        const rate = parseFloat(f.vatRate) || 0;
        const net = Math.round(amtC / (1 + rate / 100));
        const vat = amtC - net;
        const lines = [{ id: uid(), accountId: f.expense_account_id, debit: net, credit: 0, memo: f.memo || f.description }];
        if (vat > 0) {
          const { inputVAT } = getVATAccounts(accounts);
          if (inputVAT) lines.push({ id: uid(), accountId: inputVAT.id, debit: vat, credit: 0, memo: "Input VAT" });
        }
        if (mode === "expense") lines.push({ id: uid(), accountId: f.pay_account_id, debit: 0, credit: amtC, memo: "Paid immediately" });
        else { if (!apAcct) { toast("No AP account found in COA", "error"); return; } lines.push({ id: uid(), accountId: apAcct.id, debit: 0, credit: amtC, memo: "Bill payable" }); }
        const txn = { id: uid(), date: f.date, description: f.description || "Expense", ref: f.ref, counterparty: vendors.find(v => v.id === f.payee_id)?.name || "", tags: mode, isVoid: false, lines };
        setPendTxn(txn); setPreview(true);
      };
      const confirm = () => { saveTxn(pendTxn); setPreview(false); setOpen(false); toast(`${mode === "bill" ? "Bill" : "Expense"} recorded ✅`, "success"); };
      const expTxns = txns.filter(t => !t.isVoid && t.lines.some(l => {
        const a = accounts.find(x => x.id === l.accountId);
        return a?.type === "Expense" && l.debit > 0;
      })).sort((a, b) => b.date.localeCompare(a.date));
      return <div>
        <PageHeader title="Expenses & Bills">
          <div style={{ display: "flex", background: "#F3F4F6", borderRadius: 8, padding: 3, gap: 3 }}>
            {["expense", "bill"].map(m => <button key={m} style={C.btn(mode === m ? "primary" : "ghost", true)} onClick={() => setMode(m)}>{m === "bill" ? "📑 Bill" : "💳 Expense"}</button>)}
          </div>
          <button style={C.btn()} onClick={() => { setF(mkBlank()); setErrs([]); setOpen(true); }}>+ New {mode === "bill" ? "Bill" : "Expense"}</button>
        </PageHeader>
        <div style={C.card}><div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr><th style={C.th}>Date</th><th style={C.th}>Ref</th><th style={C.th}>Category</th><th style={C.th}>Description</th><th style={C.th}>Payee</th><th style={C.th}>Type</th><th style={{ ...C.th, textAlign: "right" }}>Amount</th></tr></thead>
            <tbody>{expTxns.map(t => {
              const expLine = t.lines.find(l => accounts.find(a => a.id === l.accountId)?.type === "Expense" && l.debit > 0);
              const expAcctMatch = expLine ? accounts.find(a => a.id === expLine.accountId) : null;
              const total = t.lines.reduce((s, l) => s + (l.debit || 0), 0);
              return <tr key={t.id}>
                <td style={{ ...C.td, whiteSpace: "nowrap" }}>{fmtDate(t.date)}</td>
                <td style={{ ...C.td, fontFamily: "monospace", fontSize: 12, color: GOLD_D }}>{t.ref || "—"}</td>
                <td style={{ ...C.td, fontWeight: 500 }}>{expAcctMatch ? expAcctMatch.name : "—"}</td>
                <td style={{ ...C.td, color: "#4B5563" }}>{t.description}</td>
                <td style={{ ...C.td, fontWeight: 500 }}>{t.counterparty || "—"}</td>
                <td style={C.td}><span style={C.badge(t.tags?.includes("bill") ? "warning" : "neutral")}>{t.tags?.includes("bill") ? "Bill" : "Expense"}</span></td>
                <td style={{ ...C.td, textAlign: "right", fontWeight: 600 }}>{fmtAED(total)}</td>
              </tr>;
            })}
            </tbody>
          </table>
        </div></div>
        <Modal open={open} onClose={() => setOpen(false)} title={mode === "bill" ? "📑 New Bill" : "💳 New Expense"} width={580} footer={<><button style={C.btn("secondary")} onClick={() => setOpen(false)}>Cancel</button><button style={C.btn()} onClick={requestPost}>Preview & Post →</button></>}>
          {errs.length > 0 && <div style={C.err}>{errs.join(" · ")}</div>}
          <div style={{ ...C.warn, marginBottom: 14 }}><strong>{mode === "bill" ? "Bill: " : "Expense: "}</strong>{mode === "bill" ? "Dr Expense → Cr Accounts Payable (pay later)" : "Dr Expense → Cr Bank/Cash (pay immediately)"}</div>
          <FG>
            <FItem label="Date" req><Inp type="date" value={f.date} onChange={e => setF(p => ({ ...p, date: e.target.value }))} /></FItem>
            <FItem label="Reference"><Inp value={f.ref} onChange={e => setF(p => ({ ...p, ref: e.target.value }))} /></FItem>
            <FItem label="Description" full><Inp value={f.description} onChange={e => setF(p => ({ ...p, description: e.target.value }))} /></FItem>
            <FItem label="Payee (Vendor)"><Sel value={f.payee_id} onChange={e => setF(p => ({ ...p, payee_id: e.target.value }))}><option value="">—</option>{vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</Sel></FItem>
            <FItem label="Category (Expense Acct)" req><Sel value={f.expense_account_id} onChange={e => setF(p => ({ ...p, expense_account_id: e.target.value }))}><option value="">—</option>{expAccts.map(a => <option key={a.id} value={a.id}>{a.code} — {a.name}</option>)}</Sel></FItem>
            {mode === "expense" && <FItem label="Pay From" req><Sel value={f.pay_account_id} onChange={e => setF(p => ({ ...p, pay_account_id: e.target.value }))}><option value="">—</option>{bankAccts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</Sel></FItem>}
            <FItem label="Amount (AED) - Total" req><Inp type="number" value={f.amount} onChange={e => setF(p => ({ ...p, amount: e.target.value }))} /></FItem>
            <FItem label="VAT Rate % (Included)"><Inp type="number" value={f.vatRate} onChange={e => setF(p => ({ ...p, vatRate: e.target.value }))} /></FItem>
            <FItem label="Memo" full><Inp value={f.memo} onChange={e => setF(p => ({ ...p, memo: e.target.value }))} /></FItem>
          </FG>
        </Modal>
        <PostingPreview open={preview} onClose={() => setPreview(false)} lines={pendTxn?.lines || []} accounts={accounts} onConfirm={confirm} header={pendTxn || {}} />
      </div>;
    }
